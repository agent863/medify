<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alcon × Medify 廠商專屬報告 2026 Q2</title>
<style>
  :root {
    --primary: #44BDDB;
    --accent:  #5177BA;
    --dark1:   #5177BA;
    --dark2:   #1793BA;
    --light1:  #CDEBF1;
    --light2:  #EDF7F9;
    --success: #76C0A5;
    --warn:    #F59E0B;
    --g1: #2C2C2C; --g2: #424242; --g3: #636363; --g4: #959595;
    --g7: #E8E8E8; --white: #FFFFFF; --bg: #EDF7F9;
    --radius: 16px; --shadow: 0 4px 20px rgba(81,119,186,.10);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif; background: var(--bg); color: var(--g1); line-height: 1.6; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #44BDDB 0%, #1793BA 55%, #5177BA 100%);
    color: #fff; padding: 52px 48px 44px; position: relative; overflow: hidden;
  }
  .header::before {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.07'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .header-inner { position: relative; max-width: 1040px; margin: 0 auto; }
  .header-logo { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
  .logo-badge {
    background: rgba(255,255,255,.20); border: 1px solid rgba(255,255,255,.35);
    border-radius: 12px; padding: 8px 18px; font-size: 15px; font-weight: 700;
    letter-spacing: .5px; backdrop-filter: blur(4px);
  }
  .logo-x { font-size: 18px; opacity: .65; }
  .header h1 { font-size: 30px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 14px; }
  .header .meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 13px; opacity: .88; }
  .header .meta span {
    background: rgba(255,255,255,.15); border-radius: 20px;
    padding: 5px 14px; border: 1px solid rgba(255,255,255,.25);
  }

  /* LAYOUT */
  .page { max-width: 1040px; margin: 0 auto; padding: 0 24px; }
  section { margin: 36px 0; }
  .section-title {
    font-size: 10.5px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, var(--light1), transparent); }

  /* METRICS GRID */
  .metrics-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
  @media (max-width: 768px) { .metrics-grid { grid-template-columns: repeat(2,1fr); } }

  .metric-card {
    background: var(--white); border-radius: var(--radius); padding: 24px 20px;
    box-shadow: var(--shadow); position: relative; overflow: hidden;
  }
  .metric-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(to right, var(--primary), var(--accent));
  }
  .metric-icon { font-size: 20px; margin-bottom: 10px; }
  .metric-value { font-size: 34px; font-weight: 900; color: var(--dark1); line-height: 1; margin-bottom: 6px; }
  .metric-label { font-size: 13px; font-weight: 600; color: var(--g2); margin-bottom: 3px; }
  .metric-note { font-size: 11px; color: var(--g4); }

  /* PANEL */
  .panel { background: var(--white); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); }
  .panel-title { font-size: 14px; font-weight: 700; color: var(--g1); margin-bottom: 20px; }
  .chart-wrapper { position: relative; height: 260px; }

  /* SCROLL SECTION */
  .scroll-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 480px) { .scroll-grid { grid-template-columns: 1fr; } }

  .scroll-card {
    background: var(--white); border-radius: var(--radius); padding: 32px 24px;
    box-shadow: var(--shadow); text-align: center; position: relative; overflow: hidden;
  }
  .scroll-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(to right, #D1D5DB, #9CA3AF);
  }
  .scroll-type { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--g4); margin-bottom: 12px; }
  .scroll-val { font-size: 40px; font-weight: 900; color: #C4C4C4; line-height: 1; margin-bottom: 8px; }
  .scroll-desc { font-size: 13px; font-weight: 600; color: var(--g3); margin-bottom: 10px; }
  .scroll-warn { font-size: 11px; color: var(--warn); background: #FEF3C7; border-radius: 8px; padding: 6px 10px; display: inline-block; }

  /* DONUT */
  .donut-wrap { display: flex; align-items: center; gap: 32px; flex-wrap: wrap; }
  .donut-legend { flex: 1; min-width: 160px; }
  .legend-row { display: flex; align-items: center; gap: 10px; margin-bottom: 11px; font-size: 13px; color: var(--g2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-pct { margin-left: auto; font-size: 12px; font-weight: 700; color: var(--g4); }

  /* FOOTER */
  .footer { background: var(--g1); color: rgba(255,255,255,.45); text-align: center; padding: 28px; margin-top: 60px; font-size: 12px; line-height: 2; }
  .footer strong { color: rgba(255,255,255,.75); }

  /* DOCTOR TABLE */
  .doctor-table { width: 100%; border-collapse: collapse; }
  .doctor-table th { font-size: 11px; font-weight: 700; color: var(--g4); text-transform: uppercase; letter-spacing: .5px; padding: 0 10px 10px; text-align: left; border-bottom: 2px solid var(--g7); }
  .doctor-table td { padding: 11px 10px; border-bottom: 1px solid #f4f4f4; vertical-align: middle; }
  .doctor-table tr:last-child td { border-bottom: none; }
  .doc-badge { background: var(--light2); color: var(--accent); font-size: 12px; font-weight: 700; border-radius: 8px; padding: 3px 10px; white-space: nowrap; }
  .num-cell { text-align: right; font-size: 14px; font-weight: 700; color: var(--g1); }
  .bar-wrap { display: flex; align-items: center; gap: 8px; }
  .bar-bg { background: var(--g7); border-radius: 4px; height: 6px; flex: 1; overflow: hidden; }
  .bar-fill { background: linear-gradient(to right, var(--primary), var(--accent)); height: 6px; border-radius: 4px; }
  .bar-pct { font-size: 11px; color: var(--g4); white-space: nowrap; min-width: 36px; }
  .doctor-note { font-size: 11px; color: var(--g4); margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--g7); }

  /* ARTICLE RANKING */
  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 640px) { .cat-grid { grid-template-columns: 1fr; } }
  .cat-block { background: var(--white); border-radius: var(--radius); padding: 20px 22px; box-shadow: var(--shadow); }
  .cat-header { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--g1); margin-bottom: 14px; }
  .cat-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .art-row { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f4f4f4; }
  .art-row:last-child { border-bottom: none; padding-bottom: 0; }
  .art-rank { font-size: 11px; font-weight: 800; color: var(--g4); min-width: 14px; line-height: 1.6; flex-shrink: 0; }
  .art-views { font-size: 12px; font-weight: 700; color: var(--primary); min-width: 34px; text-align: right; line-height: 1.6; flex-shrink: 0; }
  .art-title { font-size: 12px; color: var(--g2); line-height: 1.5; }

  /* QUADRANT */
  .quad-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 700px) { .quad-grid { grid-template-columns: 1fr; } }
  .quad-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .quad-hd { padding: 14px 20px 12px; }
  .quad-hd-top { font-size: 14px; font-weight: 800; margin-bottom: 3px; }
  .quad-hd-sub { font-size: 11px; opacity: .8; }
  .quad-body { padding: 4px 16px 16px; }
  .quad-row { display: flex; align-items: flex-start; gap: 8px; padding: 7px 0; border-bottom: 1px solid #f4f4f4; }
  .quad-row:last-child { border-bottom: none; }
  .quad-rank { font-size: 11px; font-weight: 800; color: var(--g4); min-width: 16px; flex-shrink: 0; line-height: 1.6; }
  .quad-nums { display: flex; flex-direction: column; min-width: 56px; flex-shrink: 0; text-align: right; }
  .quad-v { font-size: 12px; font-weight: 700; color: var(--primary); }
  .quad-r { font-size: 11px; color: var(--g4); }
  .quad-t { font-size: 12px; color: var(--g2); line-height: 1.45; }
  .quad-meta { font-size: 11px; color: var(--g4); padding: 8px 16px 0; }
</style>
</head>
