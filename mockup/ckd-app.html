<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>腎利人生 · CKD 居家照護 App 原型</title>
<style>
  .ic-svg{display:inline-block;vertical-align:middle;flex:0 0 auto;}
</style>
<style>
  /* ===== Figma Medify_UI tokens ===== */
  :root{
    --sky1:#0683AA; --sky2:#1793BA; --sky3:#28A3CA; --sky7:#94DCEA; --sky8:#CDEBF1; --sky9:#EDF7F9;
    --gray1:#2C2C2C; --gray2:#424242; --gray4:#959595; --gray5:#AEAEAE; --gray7:#E8E8E8; --gray8:#F7F7F7;
    --line:#EAEDF4; --orange:#FC9224; --orange-bg:#FFF3E2; --green:#3BAE8C; --green-bg:#E6F6F0;
    --red:#E25555; --red-bg:#FDEDED;
    --card-shadow:0 10px 36px rgba(92,103,119,.05);
    --pop-shadow:0 5px 15px rgba(0,0,0,.15);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    background:#E9EDEF; color:var(--gray2);
    display:flex;justify-content:center;align-items:flex-start;
    min-height:100vh;padding:26px 0;
  }
  .bezel{flex:0 0 auto;padding:11px;border-radius:58px;background:#0e1c22;
    box-shadow:0 26px 60px rgba(20,60,80,.35),inset 0 0 3px rgba(255,255,255,.25);position:relative;}
  .bezel::before{content:"";position:absolute;left:-3px;top:190px;width:3px;height:56px;border-radius:3px 0 0 3px;background:#0e1c22;}
  .bezel::after{content:"";position:absolute;right:-3px;top:230px;width:3px;height:88px;border-radius:0 3px 3px 0;background:#0e1c22;}
  .phone{
    width:402px;height:874px;flex:0 0 auto;border-radius:47px;
    background:linear-gradient(161deg,#CDEBF1 5.6%,#F6F6F6 42.3%);
    position:relative;overflow:hidden;
  }
  .screen{position:absolute;inset:0;display:none;flex-direction:column;background:linear-gradient(161deg,#CDEBF1 5.6%,#F6F6F6 42.3%);}
  .screen.active{display:flex;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}

  /* ===== status bar（素材）===== */
  .statusbar{height:59px;flex:0 0 auto;position:relative;z-index:5;}
  .statusbar img{width:100%;display:block;}

  /* ===== app bar ===== */
  .appbar{height:48px;flex:0 0 auto;display:flex;align-items:center;padding:0 24px;position:relative;z-index:5;}
  .backbtn{width:40px;height:40px;border-radius:6px;background:#fff;border:1px solid var(--gray8);
    display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;}
  .backbtn svg{width:22px;height:22px;}

  /* ===== headings ===== */
  .h-wrap{padding:8px 30px 4px;flex:0 0 auto;}
  .tag{display:inline-block;background:var(--gray8);color:var(--gray2);font-size:12px;font-weight:500;
    line-height:1.33;padding:4px 8px;border-radius:4px;margin-bottom:8px;}
  .h-title{font-size:24px;font-weight:600;color:var(--sky2);line-height:1.25;letter-spacing:.3px;}
  .h-sub{font-size:13px;color:var(--gray4);line-height:1.6;margin-top:6px;}
  .h-sub b{color:var(--gray2);}

  .scroll{flex:1;overflow-y:auto;padding:10px 20px 18px;-webkit-overflow-scrolling:touch;}
  .scroll::-webkit-scrollbar{width:0;}

  /* ===== cards ===== */
  .card{background:#fff;border-radius:20px;box-shadow:var(--card-shadow);padding:20px 24px;margin-bottom:16px;}
  .blocktitle{font-size:16px;font-weight:500;color:var(--sky2);line-height:1.5;margin:0 0 8px;}
  .blocktitle.bar{position:relative;padding-left:12px;}
  .blocktitle.bar::before{content:"";position:absolute;left:0;top:3px;bottom:3px;width:4px;border-radius:2px;background:var(--sky3);}
  .body-txt{font-size:16px;line-height:1.6;color:var(--gray2);margin:0 0 6px;}
  .hl{color:var(--orange);font-weight:500;}
  .divider{height:1px;background:var(--gray7);opacity:.55;margin:14px 0;}

  /* ===== video（縮圖＋外開 YouTube）===== */
  .video-link{display:block;border-radius:14px;overflow:hidden;background:linear-gradient(135deg,#193640,#28545f);
    aspect-ratio:16/9;width:100%;position:relative;text-decoration:none;}
  .video-link img{width:100%;height:100%;object-fit:cover;display:block;opacity:.88;}
  .video-link .vshade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05) 40%,rgba(0,0,0,.55));}
  .video-link .vplay{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:56px;height:56px;
    border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;}
  .video-link .vplay::after{content:"";border-left:17px solid var(--sky1);border-top:10px solid transparent;border-bottom:10px solid transparent;margin-left:4px;}
  .video-link .vtitle{position:absolute;left:12px;right:12px;bottom:10px;color:#fff;font-size:12.5px;font-weight:500;line-height:1.5;}
  .video-link .vext{position:absolute;right:10px;top:10px;background:rgba(0,0,0,.45);color:#fff;font-size:10.5px;
    padding:3px 9px;border-radius:6px;}
  .media-cap{font-size:11px;color:var(--gray5);line-height:1.5;margin-top:8px;}

  /* ===== edu image component (Figma 圖片元件) ===== */
  .edu-img{border-radius:14px;overflow:hidden;position:relative;background:linear-gradient(135deg,#E3F1F5,#CFE8EF);}
  .edu-img img{width:100%;height:100%;object-fit:cover;display:block;}
  .edu-img .role{position:absolute;top:10px;right:10px;background:rgba(23,80,100,.72);color:#fff;
    font-size:11px;font-weight:500;padding:3px 10px;border-radius:6px;backdrop-filter:blur(4px);}
  .edu-img .cap{position:absolute;left:10px;bottom:10px;background:rgba(0,0,0,.42);color:#fff;
    font-size:11.5px;font-weight:500;padding:3px 10px;border-radius:6px;backdrop-filter:blur(4px);}
  .imgnote{display:flex;gap:9px;align-items:flex-start;background:var(--sky9);border-radius:10px;
    padding:10px 13px;margin-top:10px;}
  .imgnote .b{font-size:14px;line-height:1;}
  .imgnote p{margin:0;font-size:12px;color:var(--gray4);line-height:1.55;}

  /* food grid */
  .food-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .food{background:#fff;border:1px solid var(--sky8);border-radius:12px;overflow:hidden;}
  .food .ph{height:92px;position:relative;background:linear-gradient(135deg,#E3F1F5,#D2E9EF);}
  .food .ph img{width:100%;height:100%;object-fit:cover;display:block;}
  .food .risk{position:absolute;top:6px;left:6px;font-size:10.5px;font-weight:500;padding:2px 8px;border-radius:4px;}
  .risk.stop{background:var(--red-bg);color:var(--red);}
  .risk.warn{background:var(--orange-bg);color:var(--orange);}
  .food .fx{padding:8px 10px;}
  .food .fn{font-size:13.5px;font-weight:500;color:var(--gray1);}
  .food .fd{font-size:11px;color:var(--gray4);line-height:1.45;margin-top:2px;}

  /* font-size adjuster */
  .fontbtn{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.7);backdrop-filter:blur(10px);
    border:none;border-radius:8px;padding:8px 12px;cursor:pointer;margin:2px 0 10px;}
  .fontbtn .ti{width:22px;height:22px;border-radius:5px;background:var(--sky3);color:#fff;font-size:13px;font-weight:700;
    display:flex;align-items:center;justify-content:center;}
  .fontbtn span{font-size:15px;font-weight:500;color:var(--sky1);}

  /* ===== page indicator + action bar ===== */
  .pageind{flex:0 0 auto;text-align:center;font-size:12px;font-weight:500;color:var(--gray5);padding:4px 0 6px;}
  .actionbar{flex:0 0 auto;background:#fff;border-top:1px solid var(--line);padding:14px 24px 6px;}
  .actionbar .row{display:flex;gap:16px;}
  .btn{flex:1;border-radius:8px;padding:14px 16px;font-size:14px;font-weight:500;line-height:1.33;cursor:pointer;
    font-family:inherit;transition:.14s;}
  .btn:active{transform:translateY(1px);}
  .btn-sec{background:var(--gray8);border:1px solid var(--gray7);color:var(--gray4);}
  .btn-pri{background:var(--sky3);border:1px solid var(--sky3);color:#fff;}
  .homebar{height:26px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;}
  .homebar i{width:134px;height:5px;border-radius:100px;background:#000;display:block;}

  /* ===== FAB robot + bubble（素材）===== */
  .fab{position:absolute;right:14px;bottom:118px;width:78px;height:78px;border:none;background:transparent;
    cursor:pointer;z-index:30;padding:0;filter:drop-shadow(0 5px 15px rgba(0,0,0,.2));}
  .fab img{width:100%;height:100%;object-fit:contain;display:block;}
  .fab-bubble{position:absolute;right:82px;bottom:162px;background:#DAEAF9;border:2px solid #fff;border-radius:32px;
    padding:12px 16px;font-size:12px;font-weight:500;color:var(--gray2);box-shadow:var(--pop-shadow);
    white-space:nowrap;z-index:30;cursor:pointer;
    opacity:0;transform:translateY(8px) scale(.85);transform-origin:100% 100%;
    transition:opacity .35s,transform .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
  .fab-bubble.show{opacity:1;transform:none;pointer-events:auto;}

  /* ===== steps (home)・Figma 步驟說明間距 ===== */
  .steps-hero{padding:18px 12px 10px;position:relative;flex:0 0 auto;}
  .steps-hero .logo{display:flex;align-items:center;margin-bottom:22px;}
  .steps-hero h1{margin:0;font-size:26px;font-weight:600;color:var(--sky2);line-height:1.3;letter-spacing:.5px;}
  .steps-hero .sub{font-size:14px;color:#5f6f77;line-height:1.75;margin-top:12px;margin-bottom:6px;}
  .deco{position:absolute;right:-30px;top:-34px;width:152px;pointer-events:none;z-index:0;}
  .steps-hero .logo,.steps-hero h1,.steps-hero .sub{position:relative;z-index:1;}
  .steps-hero h1{white-space:nowrap;}
  .steps-hero .logo img{filter:drop-shadow(0 3px 6px rgba(6,131,170,.25));}
  .stepcard{background:#fff;border-radius:20px;box-shadow:var(--card-shadow);padding:10px 24px 8px;margin-bottom:18px;}
  .stepcard .head{display:flex;align-items:center;gap:12px;padding:16px 0 14px;border-bottom:1px solid #F1F4F6;}
  .stepcard .head h3{margin:0;font-size:17px;font-weight:600;color:var(--sky2);}
  .timetag{font-size:12px;font-weight:500;color:var(--green);background:var(--green-bg);padding:4px 10px;border-radius:4px;}
  .steprow{display:flex;align-items:center;gap:12px;padding:17px 0;cursor:pointer;border-bottom:1px solid #F6F8F9;}
  .steprow:last-child{border-bottom:none;}
  .steprow .tx{flex:1;font-size:16px;color:var(--gray2);}
  .steprow .st{width:24px;height:24px;border-radius:50%;border:1.6px solid #D7DEE2;flex:0 0 auto;position:relative;transition:.15s;}
  .steprow.done .st{background:var(--sky3);border-color:var(--sky3);}
  .steprow.done .st::after{content:"";position:absolute;left:7.5px;top:4.5px;width:6px;height:10px;border:solid #fff;border-width:0 2.2px 2.2px 0;transform:rotate(45deg);}
  .iso-row{display:flex;gap:6px;justify-content:center;margin:4px 0 8px;flex-wrap:wrap;}
  .iso-row span{font-size:10px;color:#6a7a82;background:#fff;border:1px solid var(--sky8);padding:3px 9px;border-radius:20px;}
  .steps-note{font-size:10.5px;color:var(--gray5);text-align:center;line-height:1.6;padding:0 12px 4px;}

  /* ===== quiz ===== */
  .qtitle-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:4px;}
  .qtitle{font-size:16px;font-weight:500;color:var(--sky2);line-height:1.5;}
  .mtag{font-size:12px;font-weight:500;color:var(--orange);background:var(--orange-bg);padding:4px 8px;border-radius:4px;white-space:nowrap;}
  /* Figma Quiz/Option 圖磚 */
  .optgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:14px;}
  .otile{background:var(--sky9);border:none;border-radius:8px;padding:16px;display:flex;flex-direction:column;
    gap:12px;align-items:center;cursor:pointer;font-family:inherit;transition:.13s;}
  .otile .opic{width:108px;height:108px;border-radius:8px;background:#fff;border:2px solid #5C6FD1;
    display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .otile .lb{font-size:16px;font-weight:500;color:var(--gray1);line-height:1.33;text-align:center;}
  .otile.sel{background:var(--sky7);}
  .otile.sel .lb{color:var(--sky1);}
  .qhint{font-size:12.5px;color:var(--gray4);line-height:1.6;margin-top:8px;}

  /* BP fields + 電話式撥號鍵盤 bottom sheet */
  .bp-wrap{display:flex;gap:12px;margin:14px 0 12px;}
  .bp-field{flex:1;background:var(--sky9);border:1.6px solid transparent;border-radius:8px;padding:12px;text-align:center;cursor:pointer;}
  .bp-field.act{border-color:var(--sky3);background:#fff;}
  .bp-field .l{font-size:12px;color:var(--gray4);margin-bottom:3px;}
  .bp-field .v{font-size:28px;font-weight:600;color:var(--sky1);min-height:34px;}
  .bp-field .u{font-size:10.5px;color:var(--gray5);}
  .dp-wrap{position:absolute;inset:0;z-index:60;visibility:hidden;}
  .dp-wrap.open{visibility:visible;}
  .dp-mask{position:absolute;inset:0;background:rgba(16,40,50,.35);opacity:0;transition:.25s;}
  .dp-sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:22px 22px 0 0;
    padding:12px 26px 34px;transform:translateY(102%);transition:.32s cubic-bezier(.3,1,.4,1);
    box-shadow:0 -12px 34px rgba(20,60,80,.18);}
  .dp-wrap.open .dp-mask{opacity:1;}
  .dp-wrap.open .dp-sheet{transform:none;}
  .dp-grab{width:44px;height:5px;border-radius:3px;background:#E2E8EB;margin:0 auto 12px;}
  .dp-label{font-size:13px;color:var(--gray4);text-align:center;}
  .dp-val{font-size:36px;font-weight:700;color:var(--sky1);letter-spacing:2px;text-align:center;min-height:46px;margin:2px 0 6px;}
  .dp-val small{font-size:13px;color:var(--gray5);font-weight:500;letter-spacing:0;}
  .dp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px 30px;justify-items:center;}
  .dp-key{width:66px;height:66px;border-radius:50%;border:none;background:#F2F5F6;font-size:27px;font-weight:600;
    color:var(--gray1);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;transition:.1s;}
  .dp-key:active{background:var(--sky8);transform:scale(.94);}
  .dp-key.ghost{background:transparent;color:var(--sky1);}
  .dp-key.ok{background:var(--sky3);color:#fff;font-size:16px;font-weight:700;}

  /* ===== report ===== */
  .rep-note{border:1px dashed var(--sky8);background:rgba(255,255,255,.65);border-radius:12px;padding:12px 14px;
    font-size:12px;color:var(--gray4);line-height:1.7;margin-bottom:14px;}
  .rep-note b{color:var(--gray2);}
  .rsec{background:#fff;border-radius:20px;box-shadow:var(--card-shadow);padding:18px 20px;margin-bottom:14px;}
  .rsec .sh{display:flex;align-items:center;gap:9px;margin-bottom:12px;}
  .rsec .sh .ic{width:28px;height:28px;border-radius:8px;background:var(--sky9);display:flex;align-items:center;justify-content:center;}
  .rsec .sh .ic svg{width:16px;height:16px;}
  .rsec .sh h3{margin:0;font-size:16px;font-weight:500;color:var(--sky2);}
  .rline{background:var(--sky9);border-radius:10px;padding:12px 14px;font-size:14.5px;color:var(--gray2);line-height:1.6;margin-bottom:9px;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{background:#fff;border:1px solid var(--sky8);color:var(--gray2);font-size:12.5px;font-weight:500;padding:7px 12px;border-radius:20px;}
  .chip.warn{background:var(--orange-bg);border-color:#F6D8AE;color:#C07A14;}
  .chip.good{background:var(--green-bg);border-color:#BFE6D6;color:var(--green);}
  .expand{border-top:1px solid #F1F4F6;margin-top:6px;padding:11px 0 2px;text-align:center;font-size:13px;font-weight:500;color:var(--sky3);cursor:pointer;}

  /* ===== camera（相機 UI＋medicine_photo）===== */
  .cam{flex:1;display:flex;flex-direction:column;background:#000;position:relative;}
  .cam-top{height:96px;display:flex;align-items:center;justify-content:space-between;padding:40px 22px 0;}
  .cam-top .cbtn{width:36px;height:36px;border-radius:50%;background:rgba(60,60,60,.55);border:none;
    display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;}
  .cam-view{flex:1;position:relative;overflow:hidden;background:#111;}
  .cam-view img{width:100%;height:100%;object-fit:cover;display:block;}
  .cam-corner i{position:absolute;width:30px;height:30px;border:3px solid #F5C518;opacity:.95;}
  .cam-corner i:nth-child(1){left:26px;top:22px;border-right:none;border-bottom:none;}
  .cam-corner i:nth-child(2){right:26px;top:22px;border-left:none;border-bottom:none;}
  .cam-corner i:nth-child(3){left:26px;bottom:22px;border-right:none;border-top:none;}
  .cam-corner i:nth-child(4){right:26px;bottom:22px;border-left:none;border-top:none;}
  .cam-zoom{position:absolute;left:50%;transform:translateX(-50%);bottom:14px;display:flex;gap:6px;
    background:rgba(0,0,0,.35);border-radius:20px;padding:4px;}
  .cam-zoom span{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:11.5px;background:rgba(70,70,70,.5);}
  .cam-zoom span.on{background:rgba(30,30,30,.85);color:#F5C518;font-weight:700;}
  .cam-modes{display:flex;justify-content:center;gap:26px;padding:14px 0 6px;color:#fff;font-size:13px;letter-spacing:.5px;}
  .cam-modes span{opacity:.85;}
  .cam-modes .on{color:#F5C518;font-weight:700;}
  .cam-bottom{display:flex;align-items:center;justify-content:space-between;padding:8px 30px 26px;}
  .cam-thumb{width:46px;height:46px;border-radius:8px;overflow:hidden;border:1.5px solid rgba(255,255,255,.4);}
  .cam-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .shutter{width:68px;height:68px;border-radius:50%;border:4px solid #fff;background:transparent;cursor:pointer;position:relative;padding:0;}
  .shutter::after{content:"";position:absolute;inset:4px;border-radius:50%;background:#fff;transition:.1s;}
  .shutter:active::after{inset:7px;}
  .cam-flip{width:46px;height:46px;border-radius:50%;background:rgba(60,60,60,.55);border:none;display:flex;
    align-items:center;justify-content:center;color:#fff;cursor:pointer;}
  .cam-stage{flex:1;margin:10px 20px 14px;border-radius:20px;background:#14232B;position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;}
  .cam-frame{position:absolute;inset:26px 22px 88px;}
  .cam-frame i{position:absolute;width:34px;height:34px;border:3.5px solid #fff;opacity:.95;}
  .cam-frame i:nth-child(1){left:0;top:0;border-right:none;border-bottom:none;border-radius:8px 0 0 0;}
  .cam-frame i:nth-child(2){right:0;top:0;border-left:none;border-bottom:none;border-radius:0 8px 0 0;}
  .cam-frame i:nth-child(3){left:0;bottom:0;border-right:none;border-top:none;border-radius:0 0 0 8px;}
  .cam-frame i:nth-child(4){right:0;bottom:0;border-left:none;border-top:none;border-radius:0 0 8px 0;}
  .rx-paper{width:210px;background:#fff;border-radius:8px;padding:16px 16px 12px;transform:rotate(-2deg);box-shadow:0 10px 30px rgba(0,0,0,.4);}
  .rx-paper .rh{font-size:11px;font-weight:700;color:#33454d;text-align:center;letter-spacing:2px;border-bottom:1.5px solid #d8e0e4;padding-bottom:6px;margin-bottom:8px;}
  .rx-paper .rl{height:7px;border-radius:4px;background:#E3EAEE;margin:7px 0;}
  .rx-paper .rl.s{width:62%;}
  .rx-paper .rl.m{width:82%;}
  .cam-tip{position:absolute;top:34px;left:0;right:0;text-align:center;color:#fff;font-size:13px;font-weight:500;opacity:.92;}
  .shutter-row{position:absolute;bottom:16px;left:0;right:0;display:flex;justify-content:center;}
  .shutter{width:64px;height:64px;border-radius:50%;border:4px solid #fff;background:rgba(255,255,255,.25);cursor:pointer;position:relative;}
  .shutter::after{content:"";position:absolute;inset:5px;border-radius:50%;background:#fff;}
  .flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .18s;}

  /* med rows */
  .medrow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid #F3F6F8;}
  .medrow:last-child{border-bottom:none;}
  .med-ic{width:40px;height:40px;border-radius:10px;background:var(--sky9);display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:19px;}
  .medrow .mi{flex:1;}
  .medrow .mn{font-size:15px;font-weight:500;color:var(--gray1);}
  .medrow .mf{font-size:12px;color:var(--gray4);margin-top:2px;}
  .ok-badge{display:inline-flex;align-items:center;gap:6px;background:var(--green-bg);color:var(--green);
    font-size:12px;font-weight:500;padding:5px 11px;border-radius:20px;margin-bottom:10px;}

  /* toggle */
  .tgl{width:46px;height:27px;border-radius:20px;background:#DDE4E8;position:relative;cursor:pointer;flex:0 0 auto;transition:.18s;}
  .tgl::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:.18s;}
  .tgl.on{background:var(--sky3);}
  .tgl.on::after{left:22px;}
  .timechips{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px;}
  .tchip{font-size:12.5px;font-weight:500;color:var(--gray4);background:var(--gray8);border:1px solid var(--gray7);
    border-radius:20px;padding:6px 12px;cursor:pointer;}
  .tchip.sel{background:var(--sky9);border-color:var(--sky7);color:var(--sky1);}

  /* ===== interval calc ===== */
  .stepper{display:flex;align-items:center;justify-content:space-between;background:var(--sky9);border-radius:10px;padding:8px;}
  .stepper button{width:40px;height:40px;border-radius:8px;border:1px solid var(--sky8);background:#fff;font-size:19px;
    color:var(--sky1);cursor:pointer;font-family:inherit;}
  .stepper .val{font-size:17px;font-weight:600;color:var(--gray1);}
  .dchips{display:flex;gap:9px;flex-wrap:wrap;margin-top:4px;}
  .dchip{font-size:13.5px;font-weight:500;color:var(--gray2);background:var(--sky9);border:none;border-radius:8px;
    padding:10px 16px;cursor:pointer;font-family:inherit;}
  .dchip.sel{background:var(--sky7);color:var(--sky1);}
  .calc-result{display:flex;align-items:center;gap:16px;}
  .ring-wrap{width:86px;height:86px;position:relative;flex:0 0 auto;}
  .ring-wrap .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-wrap .num b{font-size:22px;color:var(--sky1);line-height:1;}
  .ring-wrap .num span{font-size:10px;color:var(--gray4);margin-top:2px;}
  .calc-result .info .d1{font-size:13px;color:var(--gray4);}
  .calc-result .info .d2{font-size:19px;font-weight:600;color:var(--sky2);margin:3px 0;}
  .calc-result .info .d3{font-size:12px;color:var(--gray4);line-height:1.5;}

  /* ===== checklist ===== */
  .daystrip{display:flex;gap:7px;padding:2px 20px 10px;flex:0 0 auto;}
  .day{flex:1;background:#fff;border:1.6px solid transparent;border-radius:12px;padding:8px 0 7px;text-align:center;cursor:pointer;box-shadow:var(--card-shadow);}
  .day .wd{font-size:10.5px;color:var(--gray4);}
  .day .dn{font-size:15px;font-weight:600;color:var(--gray1);margin:2px 0 4px;}
  .day .st{width:18px;height:18px;margin:0 auto;border-radius:50%;border:2px solid #E0E7EA;position:relative;}
  .day .st.full{background:var(--sky3);border-color:var(--sky3);}
  .day .st.full::after{content:"";position:absolute;left:3.5px;top:1.5px;width:4px;height:7px;border:solid #fff;border-width:0 1.8px 1.8px 0;transform:rotate(45deg);}
  .day .st.part{border-color:var(--sky7);background:linear-gradient(180deg,var(--sky7) 50%,#fff 50%);}
  .day.sel{border-color:var(--sky3);}
  .day.today .wd{color:var(--sky1);font-weight:600;}
  .ck-cap{font-size:12px;font-weight:500;color:var(--gray5);padding:12px 2px 2px;letter-spacing:.5px;}
  .ckrow{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid #F6F8F9;}
  .ckrow:last-child{border-bottom:none;}
  .ckbox{width:25px;height:25px;border-radius:8px;border:1.8px solid #D3DCE0;flex:0 0 auto;cursor:pointer;position:relative;transition:.13s;}
  .ckrow.done .ckbox{background:var(--sky3);border-color:var(--sky3);}
  .ckrow.done .ckbox::after{content:"";position:absolute;left:7.5px;top:3.5px;width:6px;height:11px;border:solid #fff;border-width:0 2.6px 2.6px 0;transform:rotate(45deg);}
  .ckrow .cl{flex:1;font-size:14.5px;color:var(--gray2);cursor:pointer;}
  .ckrow.done .cl{color:var(--gray5);}
  .ckrow.done .cl .lt{text-decoration:line-through;}
  .teachlink{font-size:12px;font-weight:500;color:var(--sky1);background:var(--sky9);border:none;border-radius:14px;
    padding:6px 11px;cursor:pointer;font-family:inherit;white-space:nowrap;}

  /* ===== teach page steps ===== */
  .tstep{display:flex;gap:12px;margin-bottom:12px;}
  .tstep .n{width:26px;height:26px;border-radius:50%;background:var(--sky9);color:var(--sky1);font-size:13px;font-weight:600;
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;margin-top:1px;}
  .tstep p{margin:0;font-size:15px;line-height:1.6;color:var(--gray2);}
  .tstep p b{color:var(--sky1);}

  /* ===== chat ===== */
  #s-chat{background:linear-gradient(161deg,#CDEBF1 5.6%,#F6F6F6 30%);}
  .chat-wrap{flex:1;overflow-y:auto;padding:8px 16px 10px;}
  .chat-wrap::-webkit-scrollbar{width:0;}
  .msg{margin-bottom:14px;}
  .msg .who{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--gray2);margin-bottom:6px;}
  .msg .who .avimg{width:26px;height:26px;border-radius:50%;display:block;}
  .bubble{display:inline-block;max-width:88%;padding:12px 14px;border-radius:14px;font-size:14px;line-height:1.7;color:var(--gray2);text-align:left;}
  .msg.ai .bubble{background:#EAF3FB;border-top-left-radius:5px;}
  .msg.me{text-align:right;}
  .msg.me .bubble{background:#F1F1F1;border-top-right-radius:5px;}
  .msg .ts{font-size:10.5px;color:var(--gray5);margin-top:5px;}
  .kb{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid #CBE7D8;color:var(--green);
    font-size:11.5px;font-weight:500;padding:4px 10px;border-radius:8px;margin-bottom:7px;}
  .kb::before{content:"✓";font-weight:900;}
  .bubble ul{margin:7px 0 3px;padding-left:18px;}
  .bubble li{margin:3px 0;}
  .chat-chips{display:flex;gap:8px;flex-wrap:wrap;padding:4px 16px 8px;flex:0 0 auto;}
  .qchip{background:#fff;border:1px solid var(--sky8);color:var(--sky1);font-size:12.5px;font-weight:500;
    padding:9px 13px;border-radius:20px;cursor:pointer;font-family:inherit;}
  .chat-inputrow{display:flex;align-items:center;gap:10px;padding:8px 16px 10px;flex:0 0 auto;}
  .chat-inputrow .clip{width:38px;height:38px;border-radius:50%;background:#fff;border:1px solid var(--gray7);display:flex;align-items:center;justify-content:center;color:var(--gray4);font-size:16px;}
  .chat-inputrow .box{flex:1;background:#fff;border:1px solid var(--gray7);border-radius:22px;padding:12px 16px;font-size:13px;color:var(--gray5);}
  .chat-inputrow .send{width:40px;height:40px;border-radius:50%;background:#E5EBEE;border:none;display:flex;align-items:center;justify-content:center;}
  .chat-inputrow .send svg{width:18px;height:18px;}
  .typing{display:inline-flex;gap:4px;padding:14px 16px;background:#EAF3FB;border-radius:14px;border-top-left-radius:5px;}
  .typing i{width:6px;height:6px;border-radius:50%;background:#9db8c9;animation:tp 1s infinite;}
  .typing i:nth-child(2){animation-delay:.18s}.typing i:nth-child(3){animation-delay:.36s}
  @keyframes tp{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}

  .attr{font-size:10px;color:var(--gray5);line-height:1.6;text-align:center;padding:2px 14px 6px;}
  .attr a{color:var(--gray5);}
</style>
</head>

const D={ctx:'quiz',field:'sys',ckKey:null,sys:'',dia:'',wt:''};
function buildDial(){
  const g=$('dp-grid');if(!g||g.childNodes.length)return;

      <button class="dp-key" onclick="dialKey('0')">0</button>
      <button class="dp-key ok" onclick="dialKey('ok')">完成</button>`;
  g.innerHTML=h;}
function updateDial(){
  let label,val,unit;
  if(D.ctx==='ckwt'){label='輸入體重';val=D.wt;unit='kg';}
  else{const f=(D.ctx==='quiz')?bp.field:D.field;
    label=f==='sys'?'輸入收縮壓 SYS':'輸入舒張壓 DIA';
    val=(D.ctx==='quiz')?bp[f]:D[f];unit='mmHg';}
  $('dp-label').textContent=label;
  $('dp-val').innerHTML=(val||'—')+` <small>${unit}</small>`;}

  D.ctx=mkey==='bp'?'ckbp':'ckwt';D.ckKey=key;D.field='sys';D.sys='';D.dia='';D.wt='';

function saveMeasure(){
  if(!ckVals[selDay])ckVals[selDay]={};

function dialKey(k){
  if(D.ctx==='quiz'){
    const f=bp.field;
    if(k==='del')bp[f]=bp[f].slice(0,-1);
    else if(k==='ok'){ if(f==='sys')bp.field='dia'; else closeDial(); }
    else if(bp[f].length<3){bp[f]+=k;if(bp[f].length===3&&f==='sys')bp.field='dia';}

  }
  if(D.ctx==='ckbp'){
    const f=D.field;
    if(k==='del')D[f]=D[f].slice(0,-1);
    else if(k==='ok'){ if(f==='sys')D.field='dia'; else {saveMeasure();return;} }
    else if(D[f].length<3){D[f]+=k;if(D[f].length===3&&f==='sys')D.field='dia';}

  if(k==='del')D.wt=D.wt.slice(0,-1);

const DAY=86400000;
let lastVisit=new Date(Date.now()-14*DAY);let gapDays=28;let gapExpand=false;
const fmt=d=>`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
const wdn=['日','一','二','三','四','五','六'];
function renderInterval(){
  const next=new Date(lastVisit.getTime()+gapDays*DAY);
  const today=new Date();today.setHours(0,0,0,0);
  const left=Math.max(0,Math.round((next-today)/DAY));
  const elapsed=Math.min(gapDays,Math.max(0,Math.round((today-lastVisit)/DAY)));
  const r=34,c=2*Math.PI*r,off=c*(1-elapsed/gapDays);
  $('interval-body').innerHTML=`
  <div class="card"><p class="blocktitle bar">上次領藥／回診日期</p>
    <div class="stepper"><button onclick="lastVisit=new Date(lastVisit.getTime()-864e5);renderInterval()">‹</button>
    <span class="val">${fmt(lastVisit)}（${wdn[lastVisit.getDay()]}）</span>
    <button onclick="lastVisit=new Date(Math.min(Date.now(),lastVisit.getTime()+864e5));renderInterval()">›</button></div></div>
  <div class="card"><p class="blocktitle bar">間隔天數</p>
    ${gapExpand
      ?`<div class="dchips">${[7,14,28,30,56,84].map(d=>`<button class="dchip ${gapDays===d?'sel':''}" onclick="gapDays=${d};gapExpand=false;renderInterval()">${d} 天</button>`).join('')}</div>`
      :`<button class="dchip sel" style="font-size:15px;font-weight:600;padding:11px 20px" onclick="gapExpand=true;renderInterval()">${gapDays} 天 ▾</button>`}
    <p class="qhint" style="margin-top:10px">慢性處方箋常見以 28 天為一次領藥週期（示意），點天數可更改。</p></div>
  <div class="card"><p class="blocktitle bar">計算結果</p>
    <div class="calc-result">

      <div class="num"><b>${left}</b><span>天後</span></div></div>

}

/* --- 近期變化：折線圖（inline SVG）--- */
function lineChart(series,labels,opts){
  const o=Object.assign({w:320,h:150,unit:''},opts||{});
  const x0=34,x1=o.w-10,y0=14,y1=o.h-26;
  const all=series.flatMap(s=>s.vals.filter(v=>v!=null));
  if(!all.length)return `<div style="padding:20px;text-align:center;color:var(--gray5);font-size:12.5px">尚無記錄，完成打卡輸入後就會出現曲線</div>`;
  let mn=Math.min(...all),mx=Math.max(...all);
  if(mn===mx){mn-=5;mx+=5;}else{const p=(mx-mn)*.18;mn-=p;mx+=p;}
  const X=i=>x0+(x1-x0)*i/(labels.length-1);
  const Y=v=>y1-(y1-y0)*(v-mn)/(mx-mn);
  let g='';
  /* 淡格線 */
  [0,.5,1].forEach(t=>{const y=y0+(y1-y0)*t;
    g+=`<line x1="${x0}" y1="${y}" x2="${x1}" y2="${y}" stroke="#E8EFF2" stroke-width="1"/>`;});
  series.forEach(s=>{
    let d='',started=false;
    s.vals.forEach((v,i)=>{if(v==null){return;}d+=(started?' L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1);started=true;});
    g+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>`;
    s.vals.forEach((v,i)=>{if(v==null)return;
      g+=`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="3.4" fill="#fff" stroke="${s.color}" stroke-width="2"/>`;
      g+=`<text x="${X(i).toFixed(1)}" y="${(Y(v)-7).toFixed(1)}" text-anchor="middle" font-size="8.5" fill="${s.color}" font-weight="600">${v}</text>`;});
  });
  labels.forEach((lb,i)=>{g+=`<text x="${X(i).toFixed(1)}" y="${o.h-8}" text-anchor="middle" font-size="8.5" fill="#AEAEAE">${lb}</text>`;});
  g+=`<text x="${x0-5}" y="${y0+3}" text-anchor="end" font-size="8" fill="#AEAEAE">${Math.round(mx)}</text>`;
  g+=`<text x="${x0-5}" y="${y1+3}" text-anchor="end" font-size="8" fill="#AEAEAE">${Math.round(mn)}</text>`;
  return `<svg viewBox="0 0 ${o.w} ${o.h}" style="width:100%;display:block">${g}</svg>`;
}
function legend(items){return `<div style="display:flex;gap:14px;margin:2px 0 6px">${items.map(i=>`<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--gray4)"><span style="width:10px;height:3px;border-radius:2px;background:${i[1]}"></span>${i[0]}</span>`).join('')}</div>`;}
function trendData(){
  const labels=days.map((d,i)=>i===6?'今天':`${d.getMonth()+1}/${d.getDate()}`);
  const sys=[],dia=[],wt=[];
  days.forEach(d=>{const v=ckVals[dkey(d)]||{};
    if(v.bp){const[a,b]=v.bp.split('/');sys.push(+a);dia.push(+b);}else{sys.push(null);dia.push(null);}
    wt.push(v.wt?+v.wt:null);});
  return {labels,sys,dia,wt};
}

let chatCtx='edu',chatLog=[],chatBusy=false,chatFrom='s-edu';
function nowTs(){const d=new Date();return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function openChat(ctx){chatCtx=ctx;chatFrom=ctx==='edu'?'s-edu':'s-check';
  chatLog=[{ai:true,html:chatScripts[ctx].hello,hello:true}];renderChat();go('s-chat');}
function closeChat(){go(chatFrom);if(chatFrom==='s-check')renderCheck();}
function renderChat(){
  const w=$('chat-wrap');
  w.innerHTML=chatLog.map(m=>{
    if(m.typing)return `<div class="msg ai"><div class="who"><img class="avimg" src="${ASSET.bot}" alt="">AI 助理</div><span class="typing"><i></i><i></i><i></i></span></div>`;
    if(m.ai)return `<div class="msg ai"><div class="who"><img class="avimg" src="${ASSET.bot}" alt="">AI 助理</div>${m.hello?'':'<div class="kb">已使用衛教知識庫</div><br>'}<div class="bubble">${m.html}${m.hello?'':'<div style="margin-top:8px;font-size:11px;color:#94a2a9">※ 以上為衛教參考，非診斷或治療建議。</div>'}</div><div class="ts">${nowTs()}</div></div>`;
    return `<div class="msg me"><div class="bubble">${m.html}</div><div class="ts">${nowTs()}</div></div>`;
  }).join('');
  w.scrollTop=w.scrollHeight;
  const used=chatLog.filter(m=>!m.ai&&!m.typing).length;
  const qa=chatScripts[chatCtx].qa;
  $('chat-chips').innerHTML=chatBusy?'':qa.filter((_,i)=>!chatLog.some(m=>!m.ai&&m.html===qa[i][0]))
    .map((q,)=>`<button class="qchip" onclick="askChat('${q[0].replace(/'/g,"\\'")}')">${msIcon('chat_bubble',13)} ${q[0]}</button>`).join('')
    ||`<button class="qchip" onclick="openChat('${chatCtx}')">${msIcon('refresh',13)} 重新開始</button>`;
}
function askChat(q){
  if(chatBusy)return;
  const qa=chatScripts[chatCtx].qa.find(x=>x[0]===q);if(!qa)return;
  chatBusy=true;chatLog.push({ai:false,html:q});chatLog.push({typing:true});renderChat();
  setTimeout(()=>{chatLog.pop();chatLog.push({ai:true,html:qa[1].join('<br>')});chatBusy=false;renderChat();},900);
}

/* =============== 瀏覽密碼閘 =============== */
(function(){
  const PASS='5748';let buf='';
  const gate=document.createElement('div');
  gate.id='gate';
  gate.innerHTML=`
  <style>
    #gate{position:fixed;inset:0;z-index:9999;background:linear-gradient(161deg,#CDEBF1 5.6%,#F6F6F6 60%);
      display:flex;align-items:center;justify-content:center;transition:opacity .4s;}
    #gate.off{opacity:0;pointer-events:none;}
    .gate-card{background:#fff;border-radius:24px;box-shadow:0 20px 50px rgba(23,128,158,.15);
      padding:30px 34px 26px;width:320px;text-align:center;font-family:inherit;}
    .gate-card img{width:40px;height:40px;margin-bottom:10px;}
    .gate-card h2{margin:0 0 4px;font-size:18px;font-weight:600;color:#1793BA;}
    .gate-card p{margin:0 0 16px;font-size:12px;color:#959595;}
    .gate-dots{display:flex;gap:14px;justify-content:center;margin-bottom:18px;}
    .gate-dots i{width:14px;height:14px;border-radius:50%;border:2px solid #CDEBF1;transition:.15s;}
    .gate-dots i.on{background:#28A3CA;border-color:#28A3CA;}
    .gate-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px 20px;justify-items:center;}
    .gate-key{width:58px;height:58px;border-radius:50%;border:none;background:#F2F5F6;font-size:23px;font-weight:600;
      color:#2C2C2C;cursor:pointer;font-family:inherit;}
    .gate-key:active{background:#CDEBF1;}
    .gate-key.g{background:transparent;font-size:16px;color:#0683AA;}
    .gate-card.shake{animation:gshake .35s;}
    @keyframes gshake{0%,100%{transform:none}25%{transform:translateX(-8px)}50%{transform:translateX(7px)}75%{transform:translateX(-5px)}}
    .gate-err{font-size:11.5px;color:#E25555;height:16px;margin-top:10px;}
  </style>
  <div class="gate-card" id="gate-card">
    <img src="${ASSET.logo}" alt="">
    <h2>慢性腎臟病 AI 導航</h2>
    <p>此為內部原型，請輸入瀏覽密碼</p>
    <div class="gate-dots" id="gate-dots"><i></i><i></i><i></i><i></i></div>
    <div class="gate-grid" id="gate-grid"></div>
    <div class="gate-err" id="gate-err"></div>
  </div>`;
  document.body.appendChild(gate);
  const dots=()=>{document.querySelectorAll('#gate-dots i').forEach((el,i)=>el.classList.toggle('on',i<buf.length));};
  window._gk=function(k){
    if(k==='d'){buf=buf.slice(0,-1);dots();return;}
    if(buf.length>=4)return;
    buf+=k;dots();
    if(buf.length===4){
      if(buf===PASS){gate.classList.add('off');setTimeout(()=>gate.remove(),450);}
      else{const c=document.getElementById('gate-card');c.classList.add('shake');
        document.getElementById('gate-err').textContent='密碼不正確，請再試一次';
        setTimeout(()=>{c.classList.remove('shake');buf='';dots();},420);}
    }};
  let g='';[1,2,3,4,5,6,7,8,9].forEach(n=>g+=`<button class="gate-key" onclick="_gk('${n}')">${n}</button>`);
  g+=`<span></span><button class="gate-key" onclick="_gk('0')">0</button><button class="gate-key g" onclick="_gk('d')">⌫</button>`;
  document.getElementById('gate-grid').innerHTML=g;
})();
