name: Monthly Article Report

on:
  schedule:
    - cron: '0 2 2 * *'
  workflow_dispatch:
    inputs:
      date_from:
        description: 'Start date YYYY-MM-DD (blank = auto prev month)'
        required: false
      date_to:
        description: 'End date YYYY-MM-DD'
        required: false

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-cloud-bigquery
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Generate
        env:
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
          BQ_DATASET: ${{ secrets.BQ_DATASET }}
          BQ_LOCATION: ${{ secrets.BQ_LOCATION }}
        run: |
          if [[ -n "${{ github.event.inputs.date_from }}" ]]; then
            python generate_article_report.py --date-from "${{ github.event.inputs.date_from }}" --date-to "${{ github.event.inputs.date_to }}" --no-push
          else
            python generate_article_report.py --no-push
          fi
      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report-*-M*-article-analysis.html
          git diff --cached --quiet || git commit -m "月報 $(date '+M%m'): Doctor-10 article analysis" && git push
