name: 週報發布通知

on:
  push:
    branches: [main]
    paths:
      - "report-*.html"

jobs:
  send-notification:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 取得本週週報資訊
        id: report
        run: |
          # 找出最新的週報 HTML
          REPORT_FILE=$(ls -t report-*.html 2>/dev/null | head -1)
          if [[ -z "$REPORT_FILE" ]]; then
            echo "找不到週報 HTML，跳過"
            exit 0
          fi

          # 從檔名解析週次與日期範圍（e.g. report-2026-W21-May17-23.html）
          BASENAME=$(basename "$REPORT_FILE" .html)
          WEEK_LABEL=$(echo "$BASENAME" | grep -oE 'W[0-9]+')
          DATE_RANGE=$(echo "$BASENAME" | grep -oE '[A-Za-z]+[0-9]+-[0-9]+' || echo "")

          # 組成 GitHub Pages URL
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$REPORT_FILE'))")
          REPORT_URL="https://agent863.github.io/data/${ENCODED}"

          echo "report_file=$REPORT_FILE" >> $GITHUB_OUTPUT
          echo "week_label=$WEEK_LABEL"   >> $GITHUB_OUTPUT
          echo "date_range=$DATE_RANGE"   >> $GITHUB_OUTPUT
          echo "report_url=$REPORT_URL"   >> $GITHUB_OUTPUT

      - name: 寄送通知信
        if: steps.report.outputs.report_file != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "【全站醫師表現週報】${{ steps.report.outputs.week_label }}（${{ steps.report.outputs.date_range }}）已更新"
          to: robin@iclarityvision.com
          from: "Medify 數據週報 <${{ secrets.SMTP_USER }}>"
          html_body: |
            <!DOCTYPE html>
            <html lang="zh-Hant">
            <head><meta charset="UTF-8"></head>
            <body style="margin:0;padding:0;background:#f6f8fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC',Arial,sans-serif;font-size:15px;line-height:1.7;color:#1a2433;">
            <div style="max-width:560px;margin:32px auto;padding:0 16px 40px;">
              <div style="background:linear-gradient(135deg,#0f6fff,#1f4cdb);color:#fff;border-radius:12px;padding:28px 32px;margin-bottom:20px;">
                <div style="font-size:11px;letter-spacing:.15em;text-transform:uppercase;opacity:.8;margin-bottom:6px;">Weekly Performance Report · ${{ steps.report.outputs.week_label }}</div>
                <h1 style="margin:0;font-size:22px;font-weight:700;">全站醫師表現週報</h1>
                <div style="font-size:13px;opacity:.9;margin-top:10px;">報告週期：${{ steps.report.outputs.date_range }}　·　數據來源：GA4 ＋ Looker Studio</div>
              </div>
              <div style="background:#fff;border:1px solid #e6ebf2;border-radius:12px;padding:24px 28px;margin-bottom:16px;">
                <p style="margin:0 0 16px;color:#4a5670;">Hi，本週全站醫師表現週報已產出並更新，請點擊下方按鈕查閱。</p>
                <a href="${{ steps.report.outputs.report_url }}" style="display:inline-block;background:#0f6fff;color:#ffffff;text-decoration:none;padding:12px 28px;border-radius:8px;font-weight:600;font-size:15px;margin:12px 0 4px;">📊 查看本週週報</a>
                <div style="margin-top:18px;">
                  <div style="font-size:12px;color:#8a94a6;margin-bottom:4px;">網頁瀏覽密碼</div>
                  <div style="display:inline-block;background:#f0f7ff;color:#0f6fff;font-family:monospace;font-size:20px;font-weight:700;letter-spacing:.15em;padding:8px 20px;border-radius:8px;border:1px solid #93c5fd;">9053</div>
                </div>
              </div>
              <div style="text-align:center;font-size:12px;color:#8a94a6;margin-top:12px;">
                本信由 GitHub Actions 自動發送<br>如有疑問請回覆此信
              </div>
            </div>
            </body>
            </html>
