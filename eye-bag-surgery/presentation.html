<!doctype html><html xmlns="http://www.w3.org/1999/xhtml"><head><title>Keynote</title><meta name="viewport" content="initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,width=device-width"/><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/></head><body id="body"><div id="stageArea"><div id="stage" class="stage"></div><div id="hyperlinkPlane" class="stage"></div></div><div id="slideshowNavigator"></div><div id="slideNumberControl"></div><div id="slideNumberDisplay"></div><div id="helpPlacard"></div><div id="waitingIndicator"><div id="waitingSpinner"></div></div><script src="assets/player/main.js"></script>
<!--
  Everything above this comment is the original, untouched Keynote HTML5
  export (index.html) — same markup, same assets/player engine, same
  rendering/animation behavior (including the gifs playing natively).

  Everything below only ADDS two things on top of that, as requested:
    1. Tap zones on the left/right 20% of the screen that turn the page
       (jump to the previous/next Keynote "slide" — i.e. one of the 6
       topics — skipping that slide's internal build steps).
    2. A long-press anywhere that opens the player's own built-in
       thumbnail navigator sidebar (already built into main.js), so you
       can tap a thumbnail to jump straight to that topic.

  Both are implemented by dispatching the exact same custom events the
  player's own touch-gesture layer already listens for
  (document.addEventListener("TouchController:SwipeEvent", ...)), so we
  are not reimplementing or overriding any of the original navigation —
  just triggering it from a bigger, more obvious tap target.
-->
<!--
  IMPORTANT: no <style> tag here on purpose. Testing on the actual
  published page showed that a <style> block placed at this point in the
  document (after the main.js script tag) gets parsed into a
  CSSStyleSheet with ZERO rules in this environment — the text is valid
  CSS and an identical block injected via JS parses fine, so something
  about a static <style> tag landing here specifically fails silently.
  That meant the nav zones and closing card had no real position/size at
  all (only the background-color fix worked, because it also had a JS
  fallback below) — the actual cause of the "亂" navigation and the
  missing slide7 card. Fix: apply every rule these elements need via JS
  (inline style properties) instead of CSS, which is proven to work
  reliably here regardless of the stylesheet-parsing quirk.
-->
<div id="__navZoneLeft"></div>
<div id="__navZoneRight"></div>
<div id="__closingCard"><img src="slides/slide7.jpg" alt="想了解更多資訊請掃描 QR Code" draggable="false"></div>
<script>
(function(){
  // Bug fix note: the previous version tracked long-press with separate
  // touch + mouse listeners on document (bubble phase), while the tap
  // zones called stopPropagation() on their own touchend/click. That
  // stopped the document-level "press ended" listener from ever running
  // for taps on the zones, leaving its timer stuck — so ~550ms after
  // ANY tap on a nav zone, the navigator would pop open on its own,
  // repeatedly. Rewritten below using Pointer Events only (no duplicate
  // touch/mouse firing) and CAPTURE-phase listeners for the long-press
  // tracking, so stopPropagation() on the zones can no longer block it.

  // ---- upfront loading screen -----------------------------------------
  // Each slide's PDF (and its gifs) is fetched over the network the first
  // time you swipe to it, which is why later slides used to pause for a
  // moment. This overlay warms the browser's HTTP cache for every OTHER
  // slide's PDF + gif + the closing card image while you're still looking
  // at slide 1, so later page turns are instant.
  //
  // Two things learned from testing this live: (1) slide 1 itself must be
  // excluded — main.js is already fetching it as part of its own normal
  // startup, and preloading it again in parallel competed for the same
  // handful of browser connections and made the very first slide slower
  // to appear, the opposite of the goal. (2) firing all ~14 requests at
  // once did the same thing to slide 1, so this runs a few at a time
  // instead of all at once.
  var PRELOAD_ASSETS = (function(){
    var slides = [
      // slide 1 (22CB59BC...) intentionally omitted — main.js loads it natively
      { uuid:'8AC9B357-96F6-4109-931E-1F264B3DC7D1', gifs:['assets/下眼瞼周圍常見問題.gif-0.0000-15.0000.gif'] },
      { uuid:'6F80DFBD-9A36-44E4-92EE-B3EA7E1CA1E2', gifs:[] },
      { uuid:'FAD1F8D5-3D72-4B24-9EE6-220209CA7A22', gifs:[] },
      { uuid:'515BF58C-A7F4-42C7-AB24-F395E442BD09', gifs:['assets/眼袋脂肪「移除」動畫-插畫.gif-0.0000-8.5000.gif','assets/眼袋脂肪「轉移」動畫-插畫.gif-0.0000-8.5000.gif'] },
      { uuid:'A020B5BA-42E6-4B54-90AC-B5DF2E7A1D61', gifs:[] }
    ];
    var urls = [];
    slides.forEach(function(s){
      urls.push('assets/' + s.uuid + '/assets/' + s.uuid + '.pdf');
      urls.push('assets/' + s.uuid + '/thumbnail.jpeg');
      s.gifs.forEach(function(g){ urls.push('assets/' + s.uuid + '/' + g); });
    });
    urls.push('slides/slide7.jpg');
    return urls;
  })();

  var preloadOverlay = document.createElement('div');
  applyStyles(preloadOverlay, {
    position:'fixed', top:'0', left:'0', right:'0', bottom:'0', zIndex:'99999',
    background:'#EDF7F9', display:'flex', flexDirection:'column',
    alignItems:'center', justifyContent:'center',
    fontFamily:'-apple-system, "PingFang TC", "Helvetica Neue", Helvetica, Arial, sans-serif'
  });
  var preloadTitle = document.createElement('div');
  preloadTitle.textContent = '眼袋手術衛教教材';
  applyStyles(preloadTitle, { fontSize:'26px', fontWeight:'700', color:'#3a5f7d', marginBottom:'26px', letterSpacing:'.02em' });
  var preloadBarOuter = document.createElement('div');
  applyStyles(preloadBarOuter, { width:'240px', height:'8px', borderRadius:'999px', background:'rgba(58,95,125,0.15)', overflow:'hidden' });
  var preloadBarInner = document.createElement('div');
  applyStyles(preloadBarInner, { width:'0%', height:'100%', background:'#4578bf', transition:'width .2s ease' });
  preloadBarOuter.appendChild(preloadBarInner);
  var preloadPct = document.createElement('div');
  preloadPct.textContent = '載入中 0%';
  applyStyles(preloadPct, { marginTop:'14px', fontSize:'14px', color:'#6b8aa0' });
  preloadOverlay.appendChild(preloadTitle);
  preloadOverlay.appendChild(preloadBarOuter);
  preloadOverlay.appendChild(preloadPct);
  document.body.appendChild(preloadOverlay);

  (function runPreload(){
    var total = PRELOAD_ASSETS.length, done = 0, finished = false;
    var CONCURRENCY = 3; // leave headroom for main.js's own slide-1 fetch
    var nextIndex = 0;

    function render(){
      var pct = Math.round((done / total) * 100);
      preloadBarInner.style.width = pct + '%';
      preloadPct.textContent = '載入中 ' + pct + '%';
    }
    function finishAll(){
      if (finished) return;
      finished = true;
      preloadOverlay.style.transition = 'opacity .3s ease';
      preloadOverlay.style.opacity = '0';
      setTimeout(function(){ preloadOverlay.parentNode && preloadOverlay.parentNode.removeChild(preloadOverlay); }, 320);
    }
    function fetchNext(){
      if (finished) return;
      if (nextIndex >= total){
        if (done >= total) finishAll();
        return;
      }
      var url = PRELOAD_ASSETS[nextIndex++];
      fetch(encodeURI(url)).catch(function(){}).then(function(){
        done++;
        render();
        if (done >= total){ clearTimeout(safetyTimer); finishAll(); }
        else { fetchNext(); }
      });
    }

    render();
    if (total === 0){ finishAll(); return; }

    // Safety net: never trap the user on the loading screen if one asset
    // stalls (slow connection, one bad URL, etc).
    var safetyTimer = setTimeout(finishAll, 20000);

    // Give main.js's own slide-1 request a head start before we start
    // competing for connections.
    setTimeout(function(){
      for (var i = 0; i < CONCURRENCY; i++) fetchNext();
    }, 1200);
  })();

  // Force the letterbox background inline (with !important) instead of
  // relying on a <style> tag — see the comment above the two nav-zone
  // divs for why. main.js ships its own "body{background-color:black}"
  // rule with no !important, so this wins regardless of rule order.
  [document.documentElement, document.body, document.getElementById('stageArea')].forEach(function(el){
    if (el) {
      el.style.setProperty('background-color', '#EDF7F9', 'important');
      el.style.setProperty('height', '100%', 'important');
    }
  });

  // Same reasoning: give the nav zones and closing card their layout via
  // inline styles rather than a stylesheet.
  var navZoneLeft = document.getElementById('__navZoneLeft');
  var navZoneRight = document.getElementById('__navZoneRight');
  var closingCard = document.getElementById('__closingCard');
  var closingCardImg = closingCard.querySelector('img');

  function applyStyles(el, styles){
    for (var prop in styles){ el.style[prop] = styles[prop]; }
  }

  applyStyles(navZoneLeft, {
    position:'fixed', top:'0', bottom:'0', left:'0', width:'20%',
    zIndex:'9999', background:'transparent', touchAction:'manipulation',
    webkitUserSelect:'none', userSelect:'none', webkitTouchCallout:'none'
  });
  applyStyles(navZoneRight, {
    position:'fixed', top:'0', bottom:'0', right:'0', width:'20%',
    zIndex:'9999', background:'transparent', touchAction:'manipulation',
    webkitUserSelect:'none', userSelect:'none', webkitTouchCallout:'none'
  });
  applyStyles(closingCard, {
    position:'fixed', top:'0', left:'0', right:'0', bottom:'0', zIndex:'9000',
    background:'#EDF7F9', display:'none', alignItems:'center', justifyContent:'center'
  });
  applyStyles(closingCardImg, {
    maxWidth:'100%', maxHeight:'100%', width:'auto', height:'auto',
    display:'block', webkitUserDrag:'none', userSelect:'none'
  });

  function fireSwipe(direction, fingers, swipeStartX){
    document.dispatchEvent(new CustomEvent("TouchController:SwipeEvent", {
      detail: { direction: direction, fingers: fingers, swipeStartX: swipeStartX }
    }));
  }
  // 2-finger "left" swipe = advance to next whole slide (skips remaining builds)
  function nativeNext(){ fireSwipe('left', 2, 9999); }
  // 1-finger "right" swipe = go back to previous whole slide
  function nativePrev(){ fireSwipe('right', 1, 9999); }
  // "right" swipe starting within 150px of the left edge = show the
  // built-in thumbnail navigator sidebar (main.js's own feature)
  function showNavigator(){ fireSwipe('right', 1, 50); }

  // ---- extra 7th "closing card" (QR code) appended after the real,
  // native last slide (slide 6 / index 5). The Keynote deck itself only
  // has 6 scenes, so this is our own overlay layered on top — landing on
  // it doesn't move the native player at all. Tapping next from here
  // walks the native player back to slide 1 (jumpToSlide isn't reachable
  // from outside, so we replay goBackToPreviousSlide the right number of
  // times instead) so the deck loops cleanly rather than dead-ending on
  // a blank page.
  var TOTAL_NATIVE_SLIDES = 6;
  var onClosingCard = false;
  var closingCardEl = closingCard; // same element styled above

  // ---- slide position tracking ------------------------------------------
  // Earlier version tried to resync currentSlide from main.js's
  // "ShowController:SlideIndexDidChangeEvent". Tested directly against the
  // live page: that event never fires for ordinary swipe-based navigation
  // (confirmed empirically — 7 synthetic swipes, zero events observed), so
  // that "fix" silently froze currentSlide at 0 forever, which broke
  // goPrev() entirely (0<=0 always true) and made the closing card
  // unreachable (0>=5 always false). Reverted to direct tracking: we
  // increment/decrement currentSlide ourselves exactly when WE trigger a
  // transition, which is correct for every tap through our own zones —
  // the actual, and previously misdiagnosed, cause of the "亂" behavior
  // was the nav zones having zero size (see the CSS note above), not this
  // counter. A hashchange listener below still guards against the rarer
  // case of the deck's own baked-in bottom-bar arrow being tapped instead.
  var currentSlide = 0; // 0-indexed
  window.addEventListener('hashchange', function(){
    // Any navigation we didn't cause ourselves (e.g. the native hyperlink
    // arrow, or the thumbnail sidebar) should at least drop the closing
    // card if it's showing, so it never sits on top of the wrong slide.
    if (onClosingCard) hideClosingCard();
  });

  function showClosingCard(){
    onClosingCard = true;
    closingCardEl.style.display = 'flex';
  }
  function hideClosingCard(){
    onClosingCard = false;
    closingCardEl.style.display = 'none';
  }

  function goNext(){
    if (onClosingCard){
      // loop back to slide 1: walk the native player backward from
      // slide 6 (where it's still sitting, untouched) all the way to
      // slide 1.
      hideClosingCard();
      var steps = TOTAL_NATIVE_SLIDES - 1, i = 0;
      (function stepBack(){
        if (i++ >= steps){ currentSlide = 0; return; }
        nativePrev();
        setTimeout(stepBack, 80);
      })();
      return;
    }
    // loopSlideshow is 0 in header.json, so calling nativeNext() while
    // already on the last real slide is a safe no-op internally — but we
    // intercept it ourselves so we can show our own 7th card instead.
    if (currentSlide >= TOTAL_NATIVE_SLIDES - 1){
      showClosingCard();
      return;
    }
    currentSlide++;
    nativeNext();
  }

  function goPrev(){
    if (onClosingCard){
      hideClosingCard(); // back to the real slide 6 underneath, already there
      return;
    }
    if (currentSlide <= 0) return;
    currentSlide--;
    nativePrev();
  }

  function bindTap(el, handler){
    var moved = false, startX = 0, startY = 0, down = false;
    el.addEventListener('pointerdown', function(e){
      down = true; moved = false; startX = e.clientX; startY = e.clientY;
    });
    el.addEventListener('pointermove', function(e){
      if (!down) return;
      if (Math.abs(e.clientX-startX) > 10 || Math.abs(e.clientY-startY) > 10) moved = true;
    });
    el.addEventListener('pointerup', function(e){
      if (down && !moved){ e.preventDefault(); e.stopPropagation(); handler(); }
      down = false;
    });
    el.addEventListener('pointercancel', function(){ down = false; });
  }

  // The deck's own slide transition takes noticeably longer than a human
  // can double-tap, and main.js appears to silently drop swipe events that
  // arrive mid-transition rather than queueing them — so a quick double
  // tap could increment our own currentSlide counter twice while the real
  // slide only advanced once (confirmed while testing: 6 rapid taps only
  // produced 1 real transition). A short cooldown after each tap keeps our
  // counter from racing ahead of reality.
  var NAV_COOLDOWN_MS = 700;
  var navLocked = false;
  function withCooldown(fn){
    return function(){
      if (navLocked) return;
      navLocked = true;
      setTimeout(function(){ navLocked = false; }, NAV_COOLDOWN_MS);
      fn();
    };
  }

  bindTap(document.getElementById('__navZoneLeft'), withCooldown(goPrev));
  bindTap(document.getElementById('__navZoneRight'), withCooldown(goNext));

  // If the built-in thumbnail navigator is used to jump to a specific
  // slide directly, make sure we're not stuck showing the closing card
  // on top of it. (The hashchange listener above also covers this, but
  // catching the click directly means it disappears with no visible lag.)
  document.getElementById('slideshowNavigator').addEventListener('click', function(){
    hideClosingCard();
  }, true);

  // long-press anywhere -> open the built-in thumbnail navigator.
  // Registered with {capture:true} so it always sees pointerup/cancel
  // regardless of stopPropagation() called by the nav zones above.
  var LONG_PRESS_MS = 550;
  var pressTimer = null, pressMoved = false, pressX = 0, pressY = 0, pressing = false;

  document.addEventListener('pointerdown', function(e){
    pressing = true; pressMoved = false; pressX = e.clientX; pressY = e.clientY;
    clearTimeout(pressTimer);
    pressTimer = setTimeout(function(){
      if (pressing && !pressMoved) showNavigator();
    }, LONG_PRESS_MS);
  }, { capture:true });

  document.addEventListener('pointermove', function(e){
    if (!pressing) return;
    if (Math.abs(e.clientX-pressX) > 12 || Math.abs(e.clientY-pressY) > 12){
      pressMoved = true;
      clearTimeout(pressTimer);
    }
  }, { capture:true });

  function stopPressing(){ pressing = false; clearTimeout(pressTimer); }
  document.addEventListener('pointerup', stopPressing, { capture:true });
  document.addEventListener('pointercancel', stopPressing, { capture:true });

  // don't let the long-press turn into a native browser/iOS context menu
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
})();
</script>
</body></html>
