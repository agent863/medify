<!doctype html><html xmlns="http://www.w3.org/1999/xhtml"><head><title>Keynote</title><meta name="viewport" content="initial-scale=1,minimum-scale=1,width=device-width"/><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/></head><body id="body"><div id="stageArea"><div id="stage" class="stage"></div><div id="hyperlinkPlane" class="stage"></div></div><div id="slideshowNavigator"></div><div id="slideNumberControl"></div><div id="slideNumberDisplay"></div><div id="helpPlacard"></div><div id="waitingIndicator"><div id="waitingSpinner"></div></div><script src="assets/player/main.js"></script>
<!--
  Design principle (per user, 2026-07-23): DO NOT interfere with ANY of the
  deck's original functionality. Every baked-in hyperlink keeps working
  exactly as authored — the TOC cards on page #0 jump to their topics, the
  bottom-bar buttons work, keyboard works, the thumbnail navigator works.

  Only three things are changed/added, all additive:

  1. Tapping BLANK space (no hyperlink under the finger) no longer
     advances the deck. Implemented by wrapping UC.advanceToNextBuild
     (UC is the player's own global ShowController, created on window
     load) to ignore calls whose reason string is the tap/click fallback
     ("processClickOrTapAtDisplayCoOrds" / "onMouseDown"). Every other
     caller — swipes, keyboard, autoplay — passes through untouched.
     No DOM overlay blocks anything, so hyperlinks are never intercepted.

  2. VIRTUAL left/right 20% tap zones: a document-level pointer listener
     checks, using the player's own hyperlink hit-test, that the tap is on
     blank space; only then does a tap in the left/right 20% page-turn by
     exactly ONE page (#0..#7, native primitives: 1-finger-left-swipe =
     advanceToNextBuild, 2-finger-right-swipe = goBackToPreviousBuild).
     A tap on a hyperlink — even inside the 20% bands — is left entirely
     to the deck. Long-press anywhere opens the built-in navigator.

  3. slides/slide7.jpg (QR closing card) replaces the blank end-of-show
     state (#8): reaching past the last real page (#7) by ANY means shows
     the card; next from the card reloads to #0 (loop), prev returns to #7.

  Position comes from location.hash (the player maintains it itself).
  The deck has exactly 8 real scenes (#0..#7), counted from the events
  arrays of the 6 slide JSONs; #8 is the player's blank end state.
  All styling is via JS inline styles: a static <style> tag at this point
  in the document parses to 0 CSS rules (verified on the live page).
-->
<div id="__closingCard"><img src="slides/slide7.jpg" alt="想了解更多資訊請掃描 QR Code" draggable="false"></div>
<script>
(function(){
  var TOTAL_CONTENT_SCENES = 8;              // #0..#7
  var LAST_SCENE = TOTAL_CONTENT_SCENES - 1; // 7
  var NAV_COOLDOWN_MS = 450;
  var LONG_PRESS_MS = 550;
  var ZONE_FRACTION = 0.2;
  var PRELOADED_FLAG = 'mfy_eyebag_preloaded';

  function applyStyles(el, styles){ for (var p in styles){ el.style[p] = styles[p]; } }
  function scene(){ var m = (location.hash || '').match(/\d+/); return m ? +m[0] : 0; }

  // ---- background -------------------------------------------------------
  [document.documentElement, document.body, document.getElementById('stageArea')].forEach(function(el){
    if (el){
      el.style.setProperty('background-color', '#EDF7F9', 'important');
      el.style.setProperty('height', '100%', 'important');
    }
  });

  // NOTE: the "tap on blank space advances one build" fallback is disabled
  // directly inside assets/player/main.js (two surgical string edits at the
  // processClickOrTapAtDisplayCoOrds / onMouseDown call sites), because the
  // player's controller lives in a closure and can't be patched from here.
  // main.js also now exposes the controller as window.__UC so we can reuse
  // its own hyperlink hit-test below. Nothing else in main.js is touched.

  // Player's own hit-test: is there a hyperlink at this display coord?
  function hyperlinkAt(x, y){
    try {
      var sc = window.__UC;
      if (!sc || !sc.displayManager) return null;
      var show = sc.displayManager.convertDisplayCoOrdsToShowCoOrds({ pointX:x, pointY:y });
      if (!show || show.pointX === -1) return null;
      return sc.findHyperlinkAtCoOrds(show) || null;
    } catch(e){ return null; }
  }

  function navigatorIsOpen(){
    var sb = document.querySelector('.navigatorThumbnailSidebar');
    if (!sb) return false;
    var l = parseFloat(getComputedStyle(sb).left);
    return isFinite(l) && l > -50;
  }

  function hideNavigator(){
    try {
      var sc = window.__UC;
      sc.navigatorController.thumbnailSidebar.hide(sc.navigatorController.leftSidebar);
      return;
    } catch(e){}
    fireSwipe('left', 1, 50); // player's own "left swipe near edge = hide sidebar"
  }

  // Auto-close the thumbnail navigator after picking a slide. Touch has no
  // mouseleave, so the player's only auto-hide path never fires on iPad.
  // Covered twice: a tap on any thumbnail (walk up the DOM for the
  // slideNumber the player stamps on it), and any hash change while the
  // navigator is open (jump landed).
  document.getElementById('slideshowNavigator').addEventListener('click', function(e){
    var t = e.target;
    while (t && t !== document.body && (t.slideNumber === undefined || t.slideNumber === null)) t = t.parentNode;
    if (t && t.slideNumber !== undefined && t.slideNumber !== null) setTimeout(hideNavigator, 200);
  });

  // ---- native one-page primitives ---------------------------------------
  function fireSwipe(direction, fingers, swipeStartX){
    document.dispatchEvent(new CustomEvent('TouchController:SwipeEvent', {
      detail: { direction: direction, fingers: fingers, swipeStartX: swipeStartX }
    }));
  }
  function nextPage(){ fireSwipe('left', 1, 9999); }   // advanceToNextBuild
  function prevPage(){ fireSwipe('right', 2, 9999); }  // goBackToPreviousBuild
  function showNavigator(){ fireSwipe('right', 1, 50); }

  // ---- 3. closing card (replaces blank #8) ------------------------------
  var closingCard = document.getElementById('__closingCard');
  var closingImg  = closingCard.querySelector('img');
  applyStyles(closingCard, {
    position:'fixed', top:'0', left:'0', right:'0', bottom:'0', zIndex:'9000',
    background:'#EDF7F9', display:'none', alignItems:'center', justifyContent:'center',
    touchAction:'manipulation' /* allows pinch-zoom + pan; only kills the 300ms double-tap delay */
  });
  applyStyles(closingImg, {
    maxWidth:'100%', maxHeight:'100%', width:'auto', height:'auto',
    display:'block', webkitUserDrag:'none', userSelect:'none'
  });
  // The card stops its events from reaching the player underneath
  // (stopPropagation), but never preventDefaults a multi-touch event —
  // pinch-to-zoom must stay fully native.
  ['touchstart','touchmove','touchend','touchcancel','mousedown','mouseup','click'].forEach(function(evt){
    closingCard.addEventListener(evt, function(e){
      e.stopPropagation();
      if (!(e.touches && e.touches.length > 1)) e.preventDefault();
    }, { passive:false });
  });

  var onCard = false;
  function showCard(){ onCard = true; closingCard.style.display = 'flex'; }
  function hideCard(){ onCard = false; closingCard.style.display = 'none'; }

  function goNext(){
    if (onCard){
      sessionStorage.setItem(PRELOADED_FLAG, '1');
      location.replace(location.pathname + location.search); // loop to #0
      return;
    }
    if (scene() >= LAST_SCENE){ showCard(); return; }
    nextPage();
  }
  function goPrev(){
    if (onCard){
      if (scene() > LAST_SCENE) prevPage(); // pull back out of the blank end state
      hideCard();
      return;
    }
    if (scene() <= 0) return;
    prevPage();
  }

  // Reaching past #7 by ANY means (our zones, bottom-bar buttons, keyboard)
  // shows the card instead of the blank end state; jumping back via the
  // navigator hides it.
  window.addEventListener('hashchange', function(){
    var s = scene();
    if (s > LAST_SCENE){ if (!onCard) showCard(); }
    else if (onCard){ hideCard(); }
  });

  // ---- 2. virtual tap zones + long-press (document-level, blocks nothing)
  var navLocked = false;
  function zoneAction(x, y){
    if (navLocked) return;
    var w = window.innerWidth;
    var inLeft  = x < w * ZONE_FRACTION;
    var inRight = x > w * (1 - ZONE_FRACTION);
    if (!inLeft && !inRight) return;
    if (!onCard){
      if (navigatorIsOpen()) return;               // navigator owns the screen
      if (document.getElementById('__preload')) return; // still loading
      if (hyperlinkAt(x, y)) return;               // deck's own button: native wins
    }
    navLocked = true;
    setTimeout(function(){ navLocked = false; }, NAV_COOLDOWN_MS);
    if (inLeft) goPrev(); else goNext();
  }

  // Multi-touch (pinch-to-zoom) must never be mistaken for a tap or a
  // long-press: the moment a second finger lands, the pending long-press
  // timer is cancelled and the whole gesture is flagged so pointerup
  // doesn't page-turn. Nothing here calls preventDefault, so the pinch
  // itself stays fully native.
  var pDown = false, pMoved = false, pX = 0, pY = 0, pressTimer = null, multiTouch = false;
  document.addEventListener('pointerdown', function(e){
    if (!e.isPrimary){ multiTouch = true; clearTimeout(pressTimer); return; }
    multiTouch = false;
    pDown = true; pMoved = false; pX = e.clientX; pY = e.clientY;
    clearTimeout(pressTimer);
    pressTimer = setTimeout(function(){
      if (pDown && !pMoved && !multiTouch && !onCard && !navigatorIsOpen()) showNavigator();
    }, LONG_PRESS_MS);
  }, { capture:true });
  document.addEventListener('pointermove', function(e){
    if (!pDown || !e.isPrimary) return;
    if (Math.abs(e.clientX-pX) > 12 || Math.abs(e.clientY-pY) > 12){
      pMoved = true; clearTimeout(pressTimer);
    }
  }, { capture:true });
  document.addEventListener('pointerup', function(e){
    clearTimeout(pressTimer);
    if (e.isPrimary && pDown && !pMoved && !multiTouch) zoneAction(e.clientX, e.clientY);
    if (e.isPrimary) pDown = false;
  }, { capture:true });
  document.addEventListener('pointercancel', function(e){
    if (e.isPrimary) pDown = false;
    clearTimeout(pressTimer);
  }, { capture:true });
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });

  // ---- gif warm-up: EVERY page load, not just first visit ---------------
  // The player creates each gif's <img> only at the moment its build
  // appears, so the ~1MB gif used to download right then — visibly slow,
  // and on a flaky moment it just never showed. Pinning them as decoded
  // Image objects right after the first slide starts loading means that
  // by the time anyone reaches those pages the gifs come straight from
  // memory/HTTP cache. Kept as live references so they can't be evicted.
  var GIF_URLS = [
    'assets/8AC9B357-96F6-4109-931E-1F264B3DC7D1/assets/下眼瞼周圍常見問題.gif-0.0000-15.0000.gif',
    'assets/515BF58C-A7F4-42C7-AB24-F395E442BD09/assets/眼袋脂肪「移除」動畫-插畫.gif-0.0000-8.5000.gif',
    'assets/515BF58C-A7F4-42C7-AB24-F395E442BD09/assets/眼袋脂肪「轉移」動畫-插畫.gif-0.0000-8.5000.gif'
  ];
  window.__gifWarm = [];
  setTimeout(function(){
    GIF_URLS.forEach(function(u){
      var im = new Image();
      im.src = encodeURI(u);
      window.__gifWarm.push(im);
    });
  }, 800); // let slide 1's own fetch get a head start

  // ---- preload with progress (first visit only per session) -------------
  if (!sessionStorage.getItem(PRELOADED_FLAG)){
    var PRELOAD_ASSETS = (function(){
      var slides = [
        // slide 1 omitted: main.js already fetches it on startup
        { uuid:'8AC9B357-96F6-4109-931E-1F264B3DC7D1' },
        { uuid:'6F80DFBD-9A36-44E4-92EE-B3EA7E1CA1E2' },
        { uuid:'FAD1F8D5-3D72-4B24-9EE6-220209CA7A22' },
        { uuid:'515BF58C-A7F4-42C7-AB24-F395E442BD09' },
        { uuid:'A020B5BA-42E6-4B54-90AC-B5DF2E7A1D61' }
      ];
      // Order matters: gifs and the closing card FIRST (small, and the
      // most visible when missing), then thumbnails, then the big PDFs —
      // previously the gifs sat behind ~25MB of PDFs, so on a slow first
      // visit the 20s escape hatch fired before they were ever cached.
      var urls = GIF_URLS.slice();
      urls.push('slides/slide7.jpg');
      slides.forEach(function(s){ urls.push('assets/' + s.uuid + '/thumbnail.jpeg'); });
      slides.forEach(function(s){ urls.push('assets/' + s.uuid + '/assets/' + s.uuid + '.pdf'); });
      return urls;
    })();

    var overlay = document.createElement('div');
    overlay.id = '__preload';
    applyStyles(overlay, {
      position:'fixed', top:'0', left:'0', right:'0', bottom:'0', zIndex:'99999',
      background:'#EDF7F9', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center',
      fontFamily:'-apple-system, "PingFang TC", "Helvetica Neue", Helvetica, Arial, sans-serif'
    });
    var oTitle = document.createElement('div');
    oTitle.textContent = '眼袋手術衛教教材';
    applyStyles(oTitle, { fontSize:'26px', fontWeight:'700', color:'#3a5f7d', marginBottom:'26px', letterSpacing:'.02em' });
    var barOuter = document.createElement('div');
    applyStyles(barOuter, { width:'240px', height:'8px', borderRadius:'999px', background:'rgba(58,95,125,0.15)', overflow:'hidden' });
    var barInner = document.createElement('div');
    applyStyles(barInner, { width:'0%', height:'100%', background:'#4578bf', transition:'width .2s ease' });
    barOuter.appendChild(barInner);
    var oPct = document.createElement('div');
    oPct.textContent = '載入中 0%';
    applyStyles(oPct, { marginTop:'14px', fontSize:'14px', color:'#6b8aa0' });
    overlay.appendChild(oTitle); overlay.appendChild(barOuter); overlay.appendChild(oPct);
    document.body.appendChild(overlay);

    (function runPreload(){
      var total = PRELOAD_ASSETS.length, done = 0, finished = false, nextIndex = 0;
      var CONCURRENCY = 3;
      function render(){
        var pct = Math.round((done / total) * 100);
        barInner.style.width = pct + '%';
        oPct.textContent = '載入中 ' + pct + '%';
      }
      function finishAll(complete){
        if (finished) return;
        finished = true;
        // Only remember "preloaded" when everything ACTUALLY finished.
        // Previously the 20s escape hatch also set the flag, so one slow
        // first visit permanently disabled preloading for the session
        // while the gifs had never been cached.
        if (complete) sessionStorage.setItem(PRELOADED_FLAG, '1');
        overlay.style.transition = 'opacity .3s ease';
        overlay.style.opacity = '0';
        setTimeout(function(){ overlay.parentNode && overlay.parentNode.removeChild(overlay); }, 320);
      }
      function fetchNext(){
        if (finished) return;
        if (nextIndex >= total){ if (done >= total) finishAll(true); return; }
        var url = PRELOAD_ASSETS[nextIndex++];
        fetch(encodeURI(url)).catch(function(){}).then(function(){
          done++; render();
          if (done >= total){ clearTimeout(safetyTimer); finishAll(true); }
          else fetchNext();
        });
      }
      render();
      var safetyTimer = setTimeout(function(){ finishAll(false); }, 20000);
      setTimeout(function(){ for (var i = 0; i < CONCURRENCY; i++) fetchNext(); }, 1200);
    })();
  }
})();
</script>
</body></html>
