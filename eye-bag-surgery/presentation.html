<!doctype html><html xmlns="http://www.w3.org/1999/xhtml"><head><title>Keynote</title><meta name="viewport" content="initial-scale=1,minimum-scale=1,width=device-width"/><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/></head><body id="body"><div id="stageArea"><div id="stage" class="stage"></div><div id="hyperlinkPlane" class="stage"></div></div><div id="slideshowNavigator"></div><div id="slideNumberControl"></div><div id="slideNumberDisplay"></div><div id="helpPlacard"></div><div id="waitingIndicator"><div id="waitingSpinner"></div></div><script src="assets/player/main.js"></script>
<!--
  Design principle (per user, 2026-07-23): DO NOT interfere with ANY of the
  deck's original functionality. Every baked-in hyperlink keeps working
  exactly as authored — the TOC cards on page #0 jump to their topics, the
  bottom-bar buttons work, keyboard works, the thumbnail navigator works.

  Only three things are changed/added, all additive:

  1. Tapping BLANK space (no hyperlink under the finger) no longer
     advances the deck. Implemented by wrapping UC.advanceToNextBuild
     (UC is the player's own global ShowController, created on window
     load) to ignore calls whose reason string is the tap/click fallback
     ("processClickOrTapAtDisplayCoOrds" / "onMouseDown"). Every other
     caller — swipes, keyboard, autoplay — passes through untouched.
     No DOM overlay blocks anything, so hyperlinks are never intercepted.

  2. VIRTUAL left/right 20% tap zones: a document-level pointer listener
     checks, using the player's own hyperlink hit-test, that the tap is on
     blank space; only then does a tap in the left/right 20% page-turn by
     exactly ONE page (#0..#7, native primitives: 1-finger-left-swipe =
     advanceToNextBuild, 2-finger-right-swipe = goBackToPreviousBuild).
     A tap on a hyperlink — even inside the 20% bands — is left entirely
     to the deck. Long-press anywhere opens the built-in navigator.

  3. slides/slide7.jpg (QR closing card) replaces the blank end-of-show
     state (#8): reaching past the last real page (#7) by ANY means shows
     the card; next from the card reloads to #0 (loop), prev returns to #7.

  Position comes from location.hash (the player maintains it itself).
  The deck has exactly 8 real scenes (#0..#7), counted from the events
  arrays of the 6 slide JSONs; #8 is the player's blank end state.
  All styling is via JS inline styles: a static <style> tag at this point
  in the document parses to 0 CSS rules (verified on the live page).
-->
<div id="__closingCard"><img src="slides/slide7.jpg" alt="想了解更多資訊請掃描 QR Code" draggable="false"></div>
<script>
(function(){
  var TOTAL_CONTENT_SCENES = 8;              // #0..#7
  var LAST_SCENE = TOTAL_CONTENT_SCENES - 1; // 7
  var NAV_COOLDOWN_MS = 450;
  var ZONE_FRACTION = 0.2;

  function applyStyles(el, styles){ for (var p in styles){ el.style[p] = styles[p]; } }
  function scene(){ var m = (location.hash || '').match(/\d+/); return m ? +m[0] : 0; }

  // ---- background -------------------------------------------------------
  [document.documentElement, document.body, document.getElementById('stageArea')].forEach(function(el){
    if (el){
      el.style.setProperty('background-color', '#EDF7F9', 'important');
      el.style.setProperty('height', '100%', 'important');
      // 'manipulation' keeps pinch-zoom fully native but disables Safari's
      // double-tap smart zoom — required so double-tap can open the
      // navigator without also zooming the page.
      el.style.setProperty('touch-action', 'manipulation', 'important');
    }
  });

  // NOTE: the "tap on blank space advances one build" fallback is disabled
  // directly inside assets/player/main.js (two surgical string edits at the
  // processClickOrTapAtDisplayCoOrds / onMouseDown call sites), because the
  // player's controller lives in a closure and can't be patched from here.
  // main.js also now exposes the controller as window.__UC so we can reuse
  // its own hyperlink hit-test below. Nothing else in main.js is touched.

  // Player's own hit-test: is there a hyperlink at this display coord?
  function hyperlinkAt(x, y){
    try {
      var sc = window.__UC;
      if (!sc || !sc.displayManager) return null;
      var show = sc.displayManager.convertDisplayCoOrdsToShowCoOrds({ pointX:x, pointY:y });
      if (!show || show.pointX === -1) return null;
      return sc.findHyperlinkAtCoOrds(show) || null;
    } catch(e){ return null; }
  }

  function navigatorIsOpen(){
    var sb = document.querySelector('.navigatorThumbnailSidebar');
    if (!sb) return false;
    var l = parseFloat(getComputedStyle(sb).left);
    return isFinite(l) && l > -50;
  }

  function hideNavigator(){
    try {
      var sc = window.__UC;
      sc.navigatorController.thumbnailSidebar.hide(sc.navigatorController.leftSidebar);
      return;
    } catch(e){}
    fireSwipe('left', 1, 50); // player's own "left swipe near edge = hide sidebar"
  }

  // Auto-close the thumbnail navigator after picking a slide. Touch has no
  // mouseleave, so the player's only auto-hide path never fires on iPad.
  // Covered twice: a tap on any thumbnail (walk up the DOM for the
  // slideNumber the player stamps on it), and any hash change while the
  // navigator is open (jump landed).
  document.getElementById('slideshowNavigator').addEventListener('click', function(e){
    var t = e.target;
    while (t && t !== document.body && (t.slideNumber === undefined || t.slideNumber === null)) t = t.parentNode;
    if (t && t.slideNumber !== undefined && t.slideNumber !== null) setTimeout(hideNavigator, 200);
  });

  // ---- native one-page primitives ---------------------------------------
  function fireSwipe(direction, fingers, swipeStartX){
    document.dispatchEvent(new CustomEvent('TouchController:SwipeEvent', {
      // synthetic:true lets the __onNativeSwipe hook in main.js tell OUR
      // events (pass straight to the player) apart from REAL finger swipes
      // (normalized below so they can never cross the last-page boundary).
      detail: { direction: direction, fingers: fingers, swipeStartX: swipeStartX, synthetic: true }
    }));
  }
  function nextPage(){ fireSwipe('left', 1, 9999); }   // advanceToNextBuild
  function prevPage(){ fireSwipe('right', 2, 9999); }  // goBackToPreviousBuild
  function showNavigator(){ fireSwipe('right', 1, 50); }

  // ---- 3. closing card (replaces blank #8) ------------------------------
  var closingCard = document.getElementById('__closingCard');
  var closingImg  = closingCard.querySelector('img');
  applyStyles(closingCard, {
    position:'fixed', top:'0', left:'0', right:'0', bottom:'0', zIndex:'9000',
    background:'#EDF7F9', display:'none', alignItems:'center', justifyContent:'center',
    touchAction:'manipulation' /* allows pinch-zoom + pan; only kills the 300ms double-tap delay */
  });
  applyStyles(closingImg, {
    maxWidth:'100%', maxHeight:'100%', width:'auto', height:'auto',
    display:'block', webkitUserDrag:'none', userSelect:'none'
  });
  // The card stops its events from reaching the player underneath
  // (stopPropagation), but never preventDefaults a multi-touch event —
  // pinch-to-zoom must stay fully native.
  ['touchstart','touchmove','touchend','touchcancel','mousedown','mouseup','click'].forEach(function(evt){
    closingCard.addEventListener(evt, function(e){
      e.stopPropagation();
      if (!(e.touches && e.touches.length > 1)) e.preventDefault();
    }, { passive:false });
  });

  var onCard = false;
  var pendingCardJump = false; // set when the sidebar's 7th thumbnail is tapped
  function showCard(){ onCard = true; closingCard.style.display = 'flex'; }
  function hideCard(){ onCard = false; closingCard.style.display = 'none'; }

  function goNext(){
    if (onCard){
      location.replace(location.pathname + location.search); // loop to #0
      return;
    }
    if (scene() >= LAST_SCENE){ showCard(); return; }
    nextPage();
  }
  function goPrev(){
    if (onCard){
      if (scene() > LAST_SCENE) prevPage(); // pull back out of the blank end state
      hideCard();
      return;
    }
    if (scene() <= 0) return;
    prevPage();
  }

  // Reaching past #7 by ANY means (our zones, bottom-bar buttons, keyboard)
  // shows the card instead of the blank end state; jumping back via the
  // navigator hides it.
  window.addEventListener('hashchange', function(){
    var s = scene();
    if (s > LAST_SCENE){ if (!onCard) showCard(); }
    else if (pendingCardJump && s === LAST_SCENE){ pendingCardJump = false; showCard(); }
    else if (onCard){ hideCard(); }
  });

  // Real finger swipes (left/right) are normalized to the same one-page
  // logic as the tap zones — previously they fed the player's raw
  // advance/back directly, so a left-swipe on the last page (#7) sailed
  // past the boundary into the blank end state. Returning true swallows
  // the native handling. Our own synthetic events pass through untouched,
  // and swipes while the navigator is open keep their native meaning
  // (swipe-to-close).
  window.__onNativeSwipe = function(detail){
    if (!detail || detail.synthetic) return false;
    if (detail.direction !== 'left' && detail.direction !== 'right') return false;
    if (navigatorIsOpen()) return false;
    if (document.getElementById('__preload') || document.getElementById('__tutorial')) return true;
    if (navLocked) return true;
    navLocked = true;
    setTimeout(function(){ navLocked = false; }, NAV_COOLDOWN_MS);
    if (detail.direction === 'left') goNext(); else goPrev();
    return true;
  };

  // ---- 2. virtual tap zones + DOUBLE-TAP navigator (blocks nothing) -----
  // Single tap, left/right 20%, blank space  -> page turn (one page).
  // DOUBLE tap on blank space in the middle  -> open thumbnail navigator.
  //   (long-press removed per spec; Safari's own double-tap smart zoom is
  //    disabled via touch-action:manipulation above, pinch still native.)
  // Taps on the deck's own hyperlinks/buttons are always left to the deck.
  var navLocked = false;
  var lastTapTime = 0, lastTapX = 0, lastTapY = 0;
  function handleTap(x, y){
    var w = window.innerWidth;
    var inLeft  = x < w * ZONE_FRACTION;
    var inRight = x > w * (1 - ZONE_FRACTION);
    if (document.getElementById('__preload')) return;  // still loading
    if (document.getElementById('__tutorial')) return; // tutorial owns taps
    if (onCard){
      if (inLeft || inRight){
        if (!navLocked){
          navLocked = true;
          setTimeout(function(){ navLocked = false; }, NAV_COOLDOWN_MS);
          if (inLeft) goPrev(); else goNext();
        }
      }
      return;
    }
    if (navigatorIsOpen()) return;              // navigator owns the screen
    if (hyperlinkAt(x, y)){ lastTapTime = 0; return; } // deck's own button
    if (inLeft || inRight){
      lastTapTime = 0;                          // zone taps never count toward double-tap
      if (!navLocked){
        navLocked = true;
        setTimeout(function(){ navLocked = false; }, NAV_COOLDOWN_MS);
        if (inLeft) goPrev(); else goNext();
      }
      return;
    }
    // middle blank space: detect double-tap
    var now = Date.now();
    if (now - lastTapTime < 400 && Math.abs(x - lastTapX) < 60 && Math.abs(y - lastTapY) < 60){
      lastTapTime = 0;
      showNavigator();
    } else {
      lastTapTime = now; lastTapX = x; lastTapY = y;
    }
  }

  // Multi-touch (pinch-to-zoom) must never be mistaken for a tap: the
  // moment a second finger lands the whole gesture is flagged so pointerup
  // does nothing. No preventDefault anywhere — pinch stays fully native.
  var pDown = false, pMoved = false, pX = 0, pY = 0, multiTouch = false;
  document.addEventListener('pointerdown', function(e){
    if (!e.isPrimary){ multiTouch = true; return; }
    multiTouch = false;
    pDown = true; pMoved = false; pX = e.clientX; pY = e.clientY;
  }, { capture:true });
  document.addEventListener('pointermove', function(e){
    if (!pDown || !e.isPrimary) return;
    if (Math.abs(e.clientX-pX) > 12 || Math.abs(e.clientY-pY) > 12) pMoved = true;
  }, { capture:true });
  document.addEventListener('pointerup', function(e){
    if (e.isPrimary && pDown && !pMoved && !multiTouch) handleTap(e.clientX, e.clientY);
    if (e.isPrimary) pDown = false;
  }, { capture:true });
  document.addEventListener('pointercancel', function(e){
    if (e.isPrimary) pDown = false;
  }, { capture:true });
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });

  // ---- gif replay on every (re)entry ------------------------------------
  // The gif files themselves loop forever (NETSCAPE loop=0, verified), but
  // the player keeps each gif's <img> element around after leaving the
  // slide — coming back showed the element frozen/hidden over the PDF's
  // static frame. On every arrival at a gif page, re-assigning src forces
  // the browser to restart the gif from frame 0, and visibility is forced
  // back on. Run twice (short + long delay) because the element may be
  // (re)created a moment after the transition lands.
  var GIF_SCENES = { 1:1, 2:1, 5:1, 6:1 }; // slide2 -> #1,#2 ; slide5 -> #5,#6
  function restartGifs(){
    var imgs = document.querySelectorAll('#stageArea img');
    for (var i = 0; i < imgs.length; i++){
      var img = imgs[i];
      var s = img.getAttribute('src') || '';
      if (!/\.gif/i.test(s)) continue;
      img.style.visibility = 'visible';
      img.style.opacity = '1';
      img.setAttribute('src', '');
      void img.offsetWidth; // force the browser to notice the swap
      img.setAttribute('src', s);
    }
  }
  window.addEventListener('hashchange', function(){
    if (!GIF_SCENES[scene()]) return;
    setTimeout(restartGifs, 400);
    setTimeout(restartGifs, 1200);
  });

  // ---- first-run tutorial (once per device, localStorage) ---------------
  var TUTORIAL_KEY = 'mfy_eyebag_tutorial_seen';
  function maybeShowTutorial(){
    try { if (localStorage.getItem(TUTORIAL_KEY)) return; } catch(e){}
    var tut = document.createElement('div');
    tut.id = '__tutorial';
    applyStyles(tut, {
      position:'fixed', top:'0', left:'0', right:'0', bottom:'0', zIndex:'60000',
      background:'rgba(18,38,54,0.82)', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', color:'#fff',
      fontFamily:'-apple-system, "PingFang TC", "Helvetica Neue", Helvetica, Arial, sans-serif',
      textAlign:'center'
    });
    function item(icon, title, sub){
      var d = document.createElement('div');
      applyStyles(d, { margin:'0 34px', display:'flex', flexDirection:'column', alignItems:'center' });
      var i = document.createElement('div');
      i.textContent = icon;
      applyStyles(i, { fontSize:'44px', lineHeight:'1', marginBottom:'14px' });
      var t = document.createElement('div');
      t.textContent = title;
      applyStyles(t, { fontSize:'20px', fontWeight:'700', marginBottom:'6px' });
      var s = document.createElement('div');
      s.textContent = sub;
      applyStyles(s, { fontSize:'15px', opacity:'0.85' });
      d.appendChild(i); d.appendChild(t); d.appendChild(s);
      return d;
    }
    var row = document.createElement('div');
    applyStyles(row, { display:'flex', flexDirection:'row', alignItems:'flex-start', marginBottom:'44px' });
    row.appendChild(item('◀', '點左側', '上一頁'));
    row.appendChild(item('👆👆', '雙擊中間', '開啟目錄'));
    row.appendChild(item('▶', '點右側', '下一頁'));
    var hint = document.createElement('div');
    hint.textContent = '點任意處開始';
    applyStyles(hint, {
      fontSize:'16px', padding:'12px 30px', borderRadius:'999px',
      border:'1px solid rgba(255,255,255,0.6)'
    });
    tut.appendChild(row); tut.appendChild(hint);
    // dismiss on any tap; never let the tap reach the deck below
    ['pointerup','click','touchend'].forEach(function(evt){
      tut.addEventListener(evt, function(e){
        e.preventDefault(); e.stopPropagation();
        try { localStorage.setItem(TUTORIAL_KEY, '1'); } catch(err){}
        tut.style.transition = 'opacity .25s ease';
        tut.style.opacity = '0';
        setTimeout(function(){ tut.parentNode && tut.parentNode.removeChild(tut); }, 270);
      }, { passive:false });
    });
    document.body.appendChild(tut);
  }

  // ---- add the missing 7th (closing card) thumbnail to the sidebar ------
  // The sidebar is built by the player from its 6 native slides; our card
  // isn't one of them, so we append a 7th item that mimics the others.
  // Tapping it jumps the deck to the last slide and lays the card on top
  // (pendingCardJump defers showCard until the jump's hashchange lands, so
  // the hashchange handler doesn't immediately hide it again).
  function goToCardFromSidebar(){
    hideNavigator();
    if (scene() === LAST_SCENE){ showCard(); return; }
    pendingCardJump = true;
    try { window.__UC.navigatorController.select(6); } // slide 6 = scene #7
    catch(e){ pendingCardJump = false; showCard(); }
    // fallback if no hashchange arrives (e.g. select silently failed)
    setTimeout(function(){
      if (pendingCardJump){ pendingCardJump = false; showCard(); }
    }, 1200);
  }
  var thumbTimer = setInterval(function(){
    var sb = document.querySelector('.navigatorThumbnailSidebar');
    if (!sb) return;
    if (sb.querySelector('.__cardThumb')) { clearInterval(thumbTimer); return; }
    var items = sb.querySelectorAll('.navigatorThumbnailItem');
    if (!items.length) return;
    var last = items[items.length - 1];
    var clone = last.cloneNode(true); // no listeners / no slideNumber props copied
    clone.classList.add('__cardThumb');
    // swap thumbnail image + slide number label
    var img = clone.querySelector('img');
    if (img){ img.removeAttribute('id'); img.src = 'slides/slide7.jpg'; }
    clone.querySelectorAll('*').forEach(function(el){
      if (el.children.length === 0 && el.textContent.trim() === String(items.length)){
        el.textContent = String(items.length + 1);
      }
    });
    ['pointerup','click','touchend'].forEach(function(evt){
      clone.addEventListener(evt, function(e){
        e.preventDefault(); e.stopPropagation();
        goToCardFromSidebar();
      }, { passive:false });
    });
    last.parentNode.appendChild(clone);
    clearInterval(thumbTimer);
  }, 600);

  // ---- mandatory loading screen: ALL gifs must finish before entry ------
  // Per spec: the user may not start flipping pages until every gif (and
  // the closing card image) is fully downloaded and decoded. The overlay
  // shows on EVERY load (repeat visits complete near-instantly from
  // cache), never times out into the deck, and auto-retries failed
  // downloads. handleTap() above refuses all taps while #__preload exists.
  // The big per-slide PDFs do NOT block entry — they warm in the
  // background after the gate opens.
  var GIF_URLS = [
    'assets/8AC9B357-96F6-4109-931E-1F264B3DC7D1/assets/下眼瞼周圍常見問題.gif-0.0000-15.0000.gif',
    'assets/515BF58C-A7F4-42C7-AB24-F395E442BD09/assets/眼袋脂肪「移除」動畫-插畫.gif-0.0000-8.5000.gif',
    'assets/515BF58C-A7F4-42C7-AB24-F395E442BD09/assets/眼袋脂肪「轉移」動畫-插畫.gif-0.0000-8.5000.gif'
  ];
  var CRITICAL_ASSETS = GIF_URLS.concat(['slides/slide7.jpg']);
  window.__gifWarm = []; // live refs so the decoded gifs can't be evicted

  var overlay = document.createElement('div');
  overlay.id = '__preload';
  applyStyles(overlay, {
    position:'fixed', top:'0', left:'0', right:'0', bottom:'0', zIndex:'99999',
    background:'#EDF7F9', display:'flex', flexDirection:'column',
    alignItems:'center', justifyContent:'center',
    fontFamily:'-apple-system, "PingFang TC", "Helvetica Neue", Helvetica, Arial, sans-serif'
  });
  var oTitle = document.createElement('div');
  oTitle.textContent = '眼袋手術衛教教材';
  applyStyles(oTitle, { fontSize:'26px', fontWeight:'700', color:'#3a5f7d', marginBottom:'26px', letterSpacing:'.02em' });
  var barOuter = document.createElement('div');
  applyStyles(barOuter, { width:'240px', height:'8px', borderRadius:'999px', background:'rgba(58,95,125,0.15)', overflow:'hidden' });
  var barInner = document.createElement('div');
  applyStyles(barInner, { width:'0%', height:'100%', background:'#4578bf', transition:'width .2s ease' });
  barOuter.appendChild(barInner);
  var oPct = document.createElement('div');
  oPct.textContent = '動畫載入中 0%';
  applyStyles(oPct, { marginTop:'14px', fontSize:'14px', color:'#6b8aa0' });
  overlay.appendChild(oTitle); overlay.appendChild(barOuter); overlay.appendChild(oPct);
  document.body.appendChild(overlay);

  (function gateOnGifs(){
    var total = CRITICAL_ASSETS.length, done = 0, closed = false;

    function render(){
      var pct = Math.round((done / total) * 100);
      barInner.style.width = pct + '%';
      oPct.textContent = '動畫載入中 ' + pct + '%';
    }
    function openGate(){
      if (closed) return;
      closed = true;
      overlay.style.transition = 'opacity .3s ease';
      overlay.style.opacity = '0';
      setTimeout(function(){
        overlay.parentNode && overlay.parentNode.removeChild(overlay);
        maybeShowTutorial(); // first-run only (localStorage)
      }, 320);
      warmRestInBackground();
    }
    function loadOne(url, attempt){
      var im = new Image();
      im.onload = function(){
        window.__gifWarm.push(im); // decoded + pinned
        done++; render();
        if (done >= total) openGate();
      };
      im.onerror = function(){
        if (attempt < 5){
          oPct.textContent = '網路不穩，重試中…';
          setTimeout(function(){ loadOne(url, attempt + 1); }, 1200 * attempt);
        } else {
          oPct.textContent = '動畫載入失敗，請檢查網路後重新整理';
        }
      };
      im.src = encodeURI(url);
    }

    render();
    CRITICAL_ASSETS.forEach(function(u){ loadOne(u, 1); });
  })();

  // Non-blocking: warm the remaining slides' PDFs + thumbnails after entry
  // so later page turns are fast too. Failures are harmless (the player
  // fetches on demand as a fallback).
  function warmRestInBackground(){
    var uuids = [
      '8AC9B357-96F6-4109-931E-1F264B3DC7D1',
      '6F80DFBD-9A36-44E4-92EE-B3EA7E1CA1E2',
      'FAD1F8D5-3D72-4B24-9EE6-220209CA7A22',
      '515BF58C-A7F4-42C7-AB24-F395E442BD09',
      'A020B5BA-42E6-4B54-90AC-B5DF2E7A1D61'
    ];
    var urls = [];
    uuids.forEach(function(u){ urls.push('assets/' + u + '/thumbnail.jpeg'); });
    uuids.forEach(function(u){ urls.push('assets/' + u + '/assets/' + u + '.pdf'); });
    var idx = 0;
    function next(){
      if (idx >= urls.length) return;
      var u = urls[idx++];
      fetch(encodeURI(u)).catch(function(){}).then(function(){ next(); });
    }
    next(); next(); // concurrency 2
  }
})();
</script>
</body></html>
