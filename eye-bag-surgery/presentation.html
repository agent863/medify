<!doctype html><html xmlns="http://www.w3.org/1999/xhtml"><head><title>Keynote</title><meta name="viewport" content="initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,width=device-width"/><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/></head><body id="body"><div id="stageArea"><div id="stage" class="stage"></div><div id="hyperlinkPlane" class="stage"></div></div><div id="slideshowNavigator"></div><div id="slideNumberControl"></div><div id="slideNumberDisplay"></div><div id="helpPlacard"></div><div id="waitingIndicator"><div id="waitingSpinner"></div></div><script src="assets/player/main.js"></script>
<!--
  Spec (confirmed with the user 2026-07-23):
    1. RIGHT 20% zone tap  = forward exactly ONE page (#0 -> #1 -> ... -> #7),
       identical to the deck's own next arrow / one build step at a time.
       LEFT 20% zone tap   = back exactly ONE page.
       Native primitives (read from main.js handleSwipeEvent):
         1-finger left  swipe -> advanceToNextBuild   (one page forward)
         2-finger right swipe -> goBackToPreviousBuild (one page back)
       (Earlier versions wrongly used 2-finger-left / 1-finger-right, which
       skip WHOLE TOPICS — that was the "亂跳/顛倒" bug.)
    2. slides/slide7.jpg (QR closing card) REPLACES scene #8. The deck has
       exactly 8 real content scenes (#0..#7 — counted from the events
       arrays in the 6 slide JSONs); #8 is the player's blank end-of-show
       state. Tapping next on #7 shows the card instead of the blank page;
       next again from the card reloads back to page #0 (loop).
    3. Taps anywhere OUTSIDE the two 20% zones do NOTHING. A full-screen
       blocker swallows touch/mouse events before they reach main.js's own
       document-level tap-to-advance handler (which is also what caused
       every real tap to double-fire on touchscreens before). Long-press
       anywhere still opens the built-in thumbnail navigator; while the
       navigator is open, the zones + blocker are hidden so thumbnails are
       tappable.
  Position tracking uses location.hash, which the player itself updates on
  every scene change — no separate counter that can desync.
  All styling is applied via JS inline styles: a static <style> tag at this
  point in the document parses to 0 CSS rules (verified live), so CSS here
  silently does nothing.
-->
<div id="__blocker"></div>
<div id="__navZoneLeft"></div>
<div id="__navZoneRight"></div>
<div id="__closingCard"><img src="slides/slide7.jpg" alt="想了解更多資訊請掃描 QR Code" draggable="false"></div>
<script>
(function(){
  var TOTAL_CONTENT_SCENES = 8;              // #0..#7, from the slide JSONs' events arrays
  var LAST_SCENE = TOTAL_CONTENT_SCENES - 1; // 7
  var NAV_COOLDOWN_MS = 450;
  var LONG_PRESS_MS = 550;
  var PRELOADED_FLAG = 'mfy_eyebag_preloaded';

  function applyStyles(el, styles){
    for (var p in styles){ el.style[p] = styles[p]; }
  }

  // True current page, straight from the player's own hash updates.
  function scene(){
    var m = (location.hash || '').match(/\d+/);
    return m ? +m[0] : 0;
  }

  // ---- background (JS-inline; <style> tags parse to 0 rules here) ------
  [document.documentElement, document.body, document.getElementById('stageArea')].forEach(function(el){
    if (el){
      el.style.setProperty('background-color', '#EDF7F9', 'important');
      el.style.setProperty('height', '100%', 'important');
    }
  });

  // ---- elements ---------------------------------------------------------
  var blocker      = document.getElementById('__blocker');
  var navZoneLeft  = document.getElementById('__navZoneLeft');
  var navZoneRight = document.getElementById('__navZoneRight');
  var closingCard  = document.getElementById('__closingCard');
  var closingImg   = closingCard.querySelector('img');

  applyStyles(blocker, {
    position:'fixed', top:'0', left:'0', right:'0', bottom:'0',
    zIndex:'8000', background:'transparent', touchAction:'none'
  });
  var zoneStyle = {
    position:'fixed', top:'0', bottom:'0', width:'20%',
    zIndex:'9999', background:'transparent', touchAction:'none',
    webkitUserSelect:'none', userSelect:'none', webkitTouchCallout:'none'
  };
  applyStyles(navZoneLeft, zoneStyle);  navZoneLeft.style.left = '0';
  applyStyles(navZoneRight, zoneStyle); navZoneRight.style.right = '0';
  applyStyles(closingCard, {
    position:'fixed', top:'0', left:'0', right:'0', bottom:'0', zIndex:'9000',
    background:'#EDF7F9', display:'none', alignItems:'center', justifyContent:'center'
  });
  applyStyles(closingImg, {
    maxWidth:'100%', maxHeight:'100%', width:'auto', height:'auto',
    display:'block', webkitUserDrag:'none', userSelect:'none'
  });

  // Swallow every real touch/mouse event on our overlays so nothing ever
  // reaches main.js's document-level tap/click-to-advance handlers.
  function swallow(el){
    ['touchstart','touchmove','touchend','touchcancel','mousedown','mouseup','click','dblclick'].forEach(function(evt){
      el.addEventListener(evt, function(e){ e.preventDefault(); e.stopPropagation(); }, { passive:false });
    });
  }
  swallow(blocker);
  swallow(navZoneLeft);
  swallow(navZoneRight);
  swallow(closingCard);

  // ---- native one-page primitives (see spec comment) --------------------
  function fireSwipe(direction, fingers, swipeStartX){
    document.dispatchEvent(new CustomEvent('TouchController:SwipeEvent', {
      detail: { direction: direction, fingers: fingers, swipeStartX: swipeStartX }
    }));
  }
  function nextPage(){ fireSwipe('left', 1, 9999); }   // advanceToNextBuild
  function prevPage(){ fireSwipe('right', 2, 9999); }  // goBackToPreviousBuild
  function showNavigator(){ fireSwipe('right', 1, 50); } // startX<150 -> sidebar

  // ---- closing card (replaces the blank #8) -----------------------------
  var onCard = false;
  function showCard(){ onCard = true; closingCard.style.display = 'flex'; }
  function hideCard(){ onCard = false; closingCard.style.display = 'none'; }

  function goNext(){
    if (onCard){
      // loop: restart the show at page #0 with a clean reload. The
      // preloader is skipped on reload via the sessionStorage flag, and
      // every asset is already in the HTTP cache, so this is fast.
      sessionStorage.setItem(PRELOADED_FLAG, '1');
      location.replace(location.pathname + location.search);
      return;
    }
    if (scene() >= LAST_SCENE){ showCard(); return; }
    nextPage();
  }
  function goPrev(){
    if (onCard){
      if (scene() > LAST_SCENE) prevPage(); // stepped into blank #8 somehow: pull back to #7
      hideCard();
      return;
    }
    if (scene() <= 0) return;
    prevPage();
  }

  // Safety net: if the player ever lands on the blank end state (#8+) by
  // any path, immediately cover it with the card — the card IS page 9.
  window.addEventListener('hashchange', function(){
    var s = scene();
    if (s > LAST_SCENE){ if (!onCard) showCard(); }
    else if (onCard){ hideCard(); } // e.g. thumbnail navigator jumped away
  });

  // ---- tap handling on the zones (Pointer Events) -----------------------
  var navLocked = false;
  function bindTap(el, handler){
    var moved = false, startX = 0, startY = 0, down = false;
    el.addEventListener('pointerdown', function(e){
      down = true; moved = false; startX = e.clientX; startY = e.clientY;
    });
    el.addEventListener('pointermove', function(e){
      if (!down) return;
      if (Math.abs(e.clientX-startX) > 10 || Math.abs(e.clientY-startY) > 10) moved = true;
    });
    el.addEventListener('pointerup', function(e){
      if (down && !moved){
        e.preventDefault(); e.stopPropagation();
        if (!navLocked){
          navLocked = true;
          setTimeout(function(){ navLocked = false; }, NAV_COOLDOWN_MS);
          handler();
        }
      }
      down = false;
    });
    el.addEventListener('pointercancel', function(){ down = false; });
  }
  bindTap(navZoneLeft, goPrev);
  bindTap(navZoneRight, goNext);

  // ---- long-press anywhere -> built-in thumbnail navigator --------------
  // Capture-phase document listeners so the zones' stopPropagation can't
  // starve the cleanup (the old "infinite popup" bug).
  var pressTimer = null, pressMoved = false, pressX = 0, pressY = 0, pressing = false;
  document.addEventListener('pointerdown', function(e){
    pressing = true; pressMoved = false; pressX = e.clientX; pressY = e.clientY;
    clearTimeout(pressTimer);
    pressTimer = setTimeout(function(){
      if (pressing && !pressMoved){ hideCard(); showNavigator(); }
    }, LONG_PRESS_MS);
  }, { capture:true });
  document.addEventListener('pointermove', function(e){
    if (!pressing) return;
    if (Math.abs(e.clientX-pressX) > 12 || Math.abs(e.clientY-pressY) > 12){
      pressMoved = true; clearTimeout(pressTimer);
    }
  }, { capture:true });
  function stopPressing(){ pressing = false; clearTimeout(pressTimer); }
  document.addEventListener('pointerup', stopPressing, { capture:true });
  document.addEventListener('pointercancel', stopPressing, { capture:true });
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });

  // While the thumbnail navigator is open our overlays would sit on top of
  // it and block thumbnail taps — hide them until it closes.
  setInterval(function(){
    var sb = document.querySelector('.navigatorThumbnailSidebar');
    var open = false;
    if (sb){
      var l = parseFloat(getComputedStyle(sb).left);
      open = isFinite(l) && l > -50;
    }
    var disp = open ? 'none' : 'block';
    if (blocker.style.display !== disp){
      blocker.style.display = disp;
      navZoneLeft.style.display = disp;
      navZoneRight.style.display = disp;
    }
  }, 300);

  // ---- upfront preload with progress (skipped after first run) ----------
  if (!sessionStorage.getItem(PRELOADED_FLAG)){
    var PRELOAD_ASSETS = (function(){
      var slides = [
        // slide 1 (22CB59BC...) omitted: main.js is already fetching it on
        // startup; re-requesting it in parallel slowed the first paint.
        { uuid:'8AC9B357-96F6-4109-931E-1F264B3DC7D1', gifs:['assets/下眼瞼周圍常見問題.gif-0.0000-15.0000.gif'] },
        { uuid:'6F80DFBD-9A36-44E4-92EE-B3EA7E1CA1E2', gifs:[] },
        { uuid:'FAD1F8D5-3D72-4B24-9EE6-220209CA7A22', gifs:[] },
        { uuid:'515BF58C-A7F4-42C7-AB24-F395E442BD09', gifs:['assets/眼袋脂肪「移除」動畫-插畫.gif-0.0000-8.5000.gif','assets/眼袋脂肪「轉移」動畫-插畫.gif-0.0000-8.5000.gif'] },
        { uuid:'A020B5BA-42E6-4B54-90AC-B5DF2E7A1D61', gifs:[] }
      ];
      var urls = [];
      slides.forEach(function(s){
        urls.push('assets/' + s.uuid + '/assets/' + s.uuid + '.pdf');
        urls.push('assets/' + s.uuid + '/thumbnail.jpeg');
        s.gifs.forEach(function(g){ urls.push('assets/' + s.uuid + '/' + g); });
      });
      urls.push('slides/slide7.jpg');
      return urls;
    })();

    var overlay = document.createElement('div');
    applyStyles(overlay, {
      position:'fixed', top:'0', left:'0', right:'0', bottom:'0', zIndex:'99999',
      background:'#EDF7F9', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center',
      fontFamily:'-apple-system, "PingFang TC", "Helvetica Neue", Helvetica, Arial, sans-serif'
    });
    var oTitle = document.createElement('div');
    oTitle.textContent = '眼袋手術衛教教材';
    applyStyles(oTitle, { fontSize:'26px', fontWeight:'700', color:'#3a5f7d', marginBottom:'26px', letterSpacing:'.02em' });
    var barOuter = document.createElement('div');
    applyStyles(barOuter, { width:'240px', height:'8px', borderRadius:'999px', background:'rgba(58,95,125,0.15)', overflow:'hidden' });
    var barInner = document.createElement('div');
    applyStyles(barInner, { width:'0%', height:'100%', background:'#4578bf', transition:'width .2s ease' });
    barOuter.appendChild(barInner);
    var oPct = document.createElement('div');
    oPct.textContent = '載入中 0%';
    applyStyles(oPct, { marginTop:'14px', fontSize:'14px', color:'#6b8aa0' });
    overlay.appendChild(oTitle); overlay.appendChild(barOuter); overlay.appendChild(oPct);
    document.body.appendChild(overlay);

    (function runPreload(){
      var total = PRELOAD_ASSETS.length, done = 0, finished = false, nextIndex = 0;
      var CONCURRENCY = 3; // leave connections free for main.js's slide-1 fetch
      function render(){
        var pct = Math.round((done / total) * 100);
        barInner.style.width = pct + '%';
        oPct.textContent = '載入中 ' + pct + '%';
      }
      function finishAll(){
        if (finished) return;
        finished = true;
        sessionStorage.setItem(PRELOADED_FLAG, '1');
        overlay.style.transition = 'opacity .3s ease';
        overlay.style.opacity = '0';
        setTimeout(function(){ overlay.parentNode && overlay.parentNode.removeChild(overlay); }, 320);
      }
      function fetchNext(){
        if (finished) return;
        if (nextIndex >= total){ if (done >= total) finishAll(); return; }
        var url = PRELOAD_ASSETS[nextIndex++];
        fetch(encodeURI(url)).catch(function(){}).then(function(){
          done++; render();
          if (done >= total){ clearTimeout(safetyTimer); finishAll(); }
          else fetchNext();
        });
      }
      render();
      var safetyTimer = setTimeout(finishAll, 20000); // never trap the user here
      setTimeout(function(){ for (var i = 0; i < CONCURRENCY; i++) fetchNext(); }, 1200);
    })();
  }
})();
</script>
</body></html>
