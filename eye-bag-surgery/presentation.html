<!doctype html><html xmlns="http://www.w3.org/1999/xhtml"><head><title>Keynote</title><meta name="viewport" content="initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,width=device-width"/><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/></head><body id="body"><div id="stageArea"><div id="stage" class="stage"></div><div id="hyperlinkPlane" class="stage"></div></div><div id="slideshowNavigator"></div><div id="slideNumberControl"></div><div id="slideNumberDisplay"></div><div id="helpPlacard"></div><div id="waitingIndicator"><div id="waitingSpinner"></div></div><script src="assets/player/main.js"></script>
<!--
  Everything above this comment is the original, untouched Keynote HTML5
  export (index.html) — same markup, same assets/player engine, same
  rendering/animation behavior (including the gifs playing natively).

  Everything below only ADDS two things on top of that, as requested:
    1. Tap zones on the left/right 20% of the screen that turn the page
       (jump to the previous/next Keynote "slide" — i.e. one of the 6
       topics — skipping that slide's internal build steps).
    2. A long-press anywhere that opens the player's own built-in
       thumbnail navigator sidebar (already built into main.js), so you
       can tap a thumbnail to jump straight to that topic.

  Both are implemented by dispatching the exact same custom events the
  player's own touch-gesture layer already listens for
  (document.addEventListener("TouchController:SwipeEvent", ...)), so we
  are not reimplementing or overriding any of the original navigation —
  just triggering it from a bigger, more obvious tap target.
-->
<style>
  /* keep the letterbox area the same light blue as the slide backgrounds
     instead of the player's default black (main.js ships its own
     "body{background-color:black}" rule with no !important — this wins
     over it, but we also set it inline via JS below as a second layer
     of defense, and force full-height so there's no unstyled sliver). */
  html, body, #stageArea{
    background-color:#EDF7F9 !important;
    height:100% !important;
  }
  #__navZoneLeft, #__navZoneRight{
    position:fixed; top:0; bottom:0; width:20%; z-index:9999;
    background:transparent; touch-action:manipulation;
    -webkit-user-select:none; user-select:none;
    -webkit-touch-callout:none;
  }
  #__navZoneLeft{ left:0; }
  #__navZoneRight{ right:0; }
  #__closingCard{
    position:fixed; inset:0; z-index:9000;
    background:#EDF7F9;
    display:none;
    align-items:center; justify-content:center;
  }
  #__closingCard.show{ display:flex; }
  #__closingCard img{
    max-width:100%; max-height:100%; width:auto; height:auto;
    display:block; -webkit-user-drag:none; user-select:none;
  }
</style>
<div id="__navZoneLeft"></div>
<div id="__navZoneRight"></div>
<div id="__closingCard"><img src="slides/slide7.jpg" alt="想了解更多資訊請掃描 QR Code" draggable="false"></div>
<script>
(function(){
  // Bug fix note: the previous version tracked long-press with separate
  // touch + mouse listeners on document (bubble phase), while the tap
  // zones called stopPropagation() on their own touchend/click. That
  // stopped the document-level "press ended" listener from ever running
  // for taps on the zones, leaving its timer stuck — so ~550ms after
  // ANY tap on a nav zone, the navigator would pop open on its own,
  // repeatedly. Rewritten below using Pointer Events only (no duplicate
  // touch/mouse firing) and CAPTURE-phase listeners for the long-press
  // tracking, so stopPropagation() on the zones can no longer block it.

  // Defense-in-depth: also force the background inline (with !important)
  // in case any webview caches an older stylesheet independently of the
  // HTML fetch. Harmless no-op if the CSS above already applied.
  [document.documentElement, document.body, document.getElementById('stageArea')].forEach(function(el){
    if (el) el.style.setProperty('background-color', '#EDF7F9', 'important');
  });

  function fireSwipe(direction, fingers, swipeStartX){
    document.dispatchEvent(new CustomEvent("TouchController:SwipeEvent", {
      detail: { direction: direction, fingers: fingers, swipeStartX: swipeStartX }
    }));
  }
  // 2-finger "left" swipe = advance to next whole slide (skips remaining builds)
  function nativeNext(){ fireSwipe('left', 2, 9999); }
  // 1-finger "right" swipe = go back to previous whole slide
  function nativePrev(){ fireSwipe('right', 1, 9999); }
  // "right" swipe starting within 150px of the left edge = show the
  // built-in thumbnail navigator sidebar (main.js's own feature)
  function showNavigator(){ fireSwipe('right', 1, 50); }

  // ---- extra 7th "closing card" (QR code) appended after the real,
  // native last slide (slide 6 / index 5). The Keynote deck itself only
  // has 6 scenes, so this is our own overlay layered on top — landing on
  // it doesn't move the native player at all. Tapping next from here
  // walks the native player back to slide 1 (jumpToSlide isn't reachable
  // from outside, so we replay goBackToPreviousSlide the right number of
  // times instead) so the deck loops cleanly rather than dead-ending on
  // a blank page.
  var TOTAL_NATIVE_SLIDES = 6;
  var onClosingCard = false;
  var closingCardEl = document.getElementById('__closingCard');

  // ---- authoritative slide position -----------------------------------
  // Root cause of the previous "亂跳" bug: we kept our OWN currentSlide
  // counter, incrementing/decrementing it only inside goNext()/goPrev().
  // But the deck's own baked-in bottom-bar arrow is a real Keynote
  // hyperlink object that calls the player's native advance/back methods
  // DIRECTLY — completely bypassing our functions. That silently moved
  // the real slide while our counter stood still, so the next tap on our
  // zones acted on a stale number and jumped/skipped incorrectly.
  //
  // Fix: main.js itself dispatches "ShowController:SlideIndexDidChangeEvent"
  // with { detail: { slideIndex } } every time the real slide index
  // changes, no matter what triggered it (our synthetic swipe, the native
  // hyperlink arrow, or the thumbnail navigator). Listening for that and
  // treating it as the single source of truth keeps us in sync with
  // reality regardless of which control the user used.
  var currentSlide = 0; // 0-indexed, kept in sync by the listener below
  document.addEventListener('ShowController:SlideIndexDidChangeEvent', function(e){
    if (e && e.detail && typeof e.detail.slideIndex === 'number'){
      currentSlide = e.detail.slideIndex;
      // If the native deck moved (e.g. via the thumbnail navigator) while
      // our closing card was showing, drop the overlay so it doesn't
      // cover the wrong slide underneath.
      if (onClosingCard) hideClosingCard();
    }
  });

  function showClosingCard(){
    onClosingCard = true;
    closingCardEl.classList.add('show');
  }
  function hideClosingCard(){
    onClosingCard = false;
    closingCardEl.classList.remove('show');
  }

  function goNext(){
    if (onClosingCard){
      // loop back to slide 1: walk the native player backward from
      // slide 6 (where it's still sitting, untouched) all the way to
      // slide 1. currentSlide will land on 0 on its own via the
      // resync listener as each step lands.
      hideClosingCard();
      var steps = TOTAL_NATIVE_SLIDES - 1, i = 0;
      (function stepBack(){
        if (i++ >= steps) return;
        nativePrev();
        setTimeout(stepBack, 80);
      })();
      return;
    }
    // loopSlideshow is 0 in header.json, so calling nativeNext() while
    // already on the last real slide is a safe no-op internally — but we
    // intercept it ourselves so we can show our own 7th card instead.
    if (currentSlide >= TOTAL_NATIVE_SLIDES - 1){
      showClosingCard();
      return;
    }
    nativeNext();
  }

  function goPrev(){
    if (onClosingCard){
      hideClosingCard(); // back to the real slide 6 underneath, already there
      return;
    }
    if (currentSlide <= 0) return;
    nativePrev();
  }

  function bindTap(el, handler){
    var moved = false, startX = 0, startY = 0, down = false;
    el.addEventListener('pointerdown', function(e){
      down = true; moved = false; startX = e.clientX; startY = e.clientY;
    });
    el.addEventListener('pointermove', function(e){
      if (!down) return;
      if (Math.abs(e.clientX-startX) > 10 || Math.abs(e.clientY-startY) > 10) moved = true;
    });
    el.addEventListener('pointerup', function(e){
      if (down && !moved){ e.preventDefault(); e.stopPropagation(); handler(); }
      down = false;
    });
    el.addEventListener('pointercancel', function(){ down = false; });
  }

  bindTap(document.getElementById('__navZoneLeft'), goPrev);
  bindTap(document.getElementById('__navZoneRight'), goNext);

  // If the built-in thumbnail navigator is used to jump to a specific
  // slide directly, make sure we're not stuck showing the closing card
  // on top of it. (currentSlide itself resyncs automatically via the
  // ShowController:SlideIndexDidChangeEvent listener above.)
  document.getElementById('slideshowNavigator').addEventListener('click', function(){
    hideClosingCard();
  }, true);

  // long-press anywhere -> open the built-in thumbnail navigator.
  // Registered with {capture:true} so it always sees pointerup/cancel
  // regardless of stopPropagation() called by the nav zones above.
  var LONG_PRESS_MS = 550;
  var pressTimer = null, pressMoved = false, pressX = 0, pressY = 0, pressing = false;

  document.addEventListener('pointerdown', function(e){
    pressing = true; pressMoved = false; pressX = e.clientX; pressY = e.clientY;
    clearTimeout(pressTimer);
    pressTimer = setTimeout(function(){
      if (pressing && !pressMoved) showNavigator();
    }, LONG_PRESS_MS);
  }, { capture:true });

  document.addEventListener('pointermove', function(e){
    if (!pressing) return;
    if (Math.abs(e.clientX-pressX) > 12 || Math.abs(e.clientY-pressY) > 12){
      pressMoved = true;
      clearTimeout(pressTimer);
    }
  }, { capture:true });

  function stopPressing(){ pressing = false; clearTimeout(pressTimer); }
  document.addEventListener('pointerup', stopPressing, { capture:true });
  document.addEventListener('pointercancel', stopPressing, { capture:true });

  // don't let the long-press turn into a native browser/iOS context menu
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
})();
</script>
</body></html>
